# Hawky Configuration File
# Place this file at the root of your repository as .hawky.yml or .hawky.yaml
#
# All settings are optional - Hawky uses sensible defaults when not specified:
# - All gates enabled
# - All gates are blocking (failures stop the workflow)
# - Fail-fast mode enabled (stops on first blocking failure)

# Global fail-fast setting
# When true, subsequent gates are skipped if a blocking gate fails
# Default: true
fail_fast: true

# Gate configuration
gates:
  # TypeScript type checking
  typescript:
    enabled: true      # Run this gate? Default: true
    blocking: true     # Block merge on failure? Default: true
    timeout: 300       # Timeout in seconds. Default: 300 (5 min)

  # Build step (npm run build, etc.)
  build:
    enabled: true
    blocking: true
    timeout: 600       # Default: 600 (10 min)
    # command: "yarn build"  # Override build command (otherwise uses package.json or .claude/COMMANDS.md)

  # Test suite
  test:
    enabled: true
    blocking: true
    timeout: 600       # Default: 600 (10 min)
    # command: "yarn test --ci"  # Override test command

  # ESLint linting
  eslint:
    enabled: true
    blocking: false    # Non-blocking: warnings shown but don't fail the PR
    timeout: 300       # Default: 300 (5 min)

  # Semgrep security scanning (S009)
  semgrep:
    enabled: true
    blocking: true     # High-severity findings block merge by default
    timeout: 600       # Default: 600 (10 min)
    # rulesets: "p/security-audit p/typescript"  # Space-separated ruleset IDs. Default: p/security-audit

  # Gitleaks secret scanning (S015)
  gitleaks:
    enabled: true
    blocking: true     # Any detected secrets block merge by default
    timeout: 300       # Default: 300 (5 min)
    # Note: Use .gitleaksignore file for suppressions (e.g., test fixtures, examples)

# Example: Disable ESLint temporarily during migration
# gates:
#   eslint:
#     enabled: false

# Example: Make test failures non-blocking during adoption
# gates:
#   test:
#     blocking: false

# Example: Use custom test command
# gates:
#   test:
#     command: "npm run test:ci -- --coverage"

# ==============================================================================
# Grace Period Mode (S082)
# ==============================================================================
# Grace period gives teams time to fix existing issues after adopting Hawky.
# During grace period, ALL violations become warnings — nothing blocks merge.
#
# grace_period:
#   end_date: "2026-03-15"  # Date when grace period ends (YYYY-MM-DD)
#
# Alternative: specify number of 2-week sprints from today:
# grace_period:
#   sprints: 2              # Grace period ends after 2 sprints (28 days)
#
# During grace period:
# - All violations are reported but don't block merge
# - PR comments show "Grace Period Active" banner
# - After end_date, normal blocking resumes automatically
#
# Example: 30-day grace period for team adoption
# grace_period:
#   end_date: "2026-04-01"

# ==============================================================================
# Baseline Mode (S081)
# ==============================================================================
# Hawky supports baseline mode for repos with existing tech debt.
# Only NEW violations (not in baseline) will block merge.
#
# To generate a baseline:
#   1. Go to Actions > Hawky Code Review > Run workflow
#   2. Select mode: "baseline" or "baseline-update"
#   3. Enter branch name (default: main)
#   4. Run - baseline will be saved to .hawky/baseline.json
#
# Baseline file is committed to your repo and should be versioned.
# Each violation is identified by a content hash (not line number),
# so violations remain tracked even if code moves around.
#
# To update the baseline after fixing issues:
#   Run workflow with mode: "baseline-update"

# ==============================================================================
# Combining Baseline + Grace Period
# ==============================================================================
# These features work together:
# - Baseline tracks EXISTING violations so only NEW ones block
# - Grace period makes even NEW violations non-blocking temporarily
#
# Recommended adoption flow:
# 1. Generate baseline (captures existing tech debt)
# 2. Enable grace period (gives team time to learn Hawky)
# 3. After grace period ends, only NEW violations block
# 4. Gradually fix baseline violations over time
