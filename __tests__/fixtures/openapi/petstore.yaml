openapi: 3.0.3
info:
  title: Pet Store API
  version: 1.0.0
  description: A sample API for testing the spec parser

servers:
  - url: https://api.petstore.example.com/v1
    description: Production

tags:
  - name: pets
    description: Pet operations
  - name: users
    description: User operations

paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of pets to return
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Bad request
        '500':
          description: Internal server error

    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
        '422':
          description: Validation error

  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        description: ID of pet to retrieve
        schema:
          type: string
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags:
        - pets
      responses:
        '200':
          description: Pet details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found

    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - pets
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Pet deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Pet not found

  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get current user
      tags:
        - users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  /deprecated:
    get:
      operationId: deprecatedEndpoint
      summary: Deprecated endpoint
      deprecated: true
      responses:
        '200':
          description: Success

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            - available
            - pending
            - sold

    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        status:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
