# Hawky - AI-powered Code Review for Multi-Agent Teams
#
# Required Secrets:
#   HAWKY_CLAUDE_API_KEY - Claude API key for AI analysis (optional for scaffold)
#   HAWKY_GITHUB_TOKEN   - GitHub PAT for cross-repo access (optional - use GITHUB_TOKEN for same-repo)
#
# The default GITHUB_TOKEN is sufficient for:
#   - Reading PR metadata
#   - Posting PR comments
#   - Reading issues
#
# Only add HAWKY_GITHUB_TOKEN if cross-repo access is needed.

name: Hawky Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # S081: Baseline generation via workflow_dispatch
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'review'
        type: choice
        options:
          - review
          - baseline
          - baseline-update
      baseline_branch:
        description: 'Branch to generate baseline from (for baseline mode)'
        required: false
        default: 'main'
        type: string

# Cancel in-progress runs when new commits push
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Default configuration (can be overridden by .hawky.yml)
# - HAWKY_FAIL_FAST: stop subsequent gates when a blocking gate fails
# - Gate-specific settings: enable/disable, blocking/non-blocking, custom commands, timeouts
env:
  HAWKY_FAIL_FAST: 'true'
  # Defaults - all gates enabled and blocking
  HAWKY_GATE_TYPESCRIPT_ENABLED: 'true'
  HAWKY_GATE_TYPESCRIPT_BLOCKING: 'true'
  HAWKY_GATE_TYPESCRIPT_TIMEOUT: '300'
  HAWKY_GATE_BUILD_ENABLED: 'true'
  HAWKY_GATE_BUILD_BLOCKING: 'true'
  HAWKY_GATE_BUILD_TIMEOUT: '600'
  HAWKY_GATE_BUILD_COMMAND: ''
  HAWKY_GATE_TEST_ENABLED: 'true'
  HAWKY_GATE_TEST_BLOCKING: 'true'
  HAWKY_GATE_TEST_TIMEOUT: '600'
  HAWKY_GATE_TEST_COMMAND: ''
  HAWKY_GATE_ESLINT_ENABLED: 'true'
  HAWKY_GATE_ESLINT_BLOCKING: 'true'
  HAWKY_GATE_ESLINT_TIMEOUT: '300'
  # S009: Semgrep security scanning
  HAWKY_GATE_SEMGREP_ENABLED: 'true'
  HAWKY_GATE_SEMGREP_BLOCKING: 'true'
  HAWKY_GATE_SEMGREP_TIMEOUT: '600'
  HAWKY_GATE_SEMGREP_RULESETS: 'p/security-audit'
  # S015: Gitleaks secret scanning
  HAWKY_GATE_GITLEAKS_ENABLED: 'true'
  HAWKY_GATE_GITLEAKS_BLOCKING: 'true'
  HAWKY_GATE_GITLEAKS_TIMEOUT: '300'

# Explicit minimal permissions
# S081: contents: write needed for baseline commits
permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  # S081: Baseline generation job - runs on workflow_dispatch with baseline mode
  hawky-baseline:
    name: Generate Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode == 'baseline' || inputs.mode == 'baseline-update') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.baseline_branch || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Generate Baseline
        id: baseline
        run: |
          echo "## Hawky Baseline Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ inputs.baseline_branch || 'main' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** \`${{ inputs.mode }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Create baseline directory
          mkdir -p .hawky

          # Initialize baseline JSON
          BASELINE_FILE=".hawky/baseline.json"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Start baseline structure
          echo "{" > /tmp/baseline.json
          echo "  \"version\": \"1.0.0\"," >> /tmp/baseline.json
          echo "  \"generated_at\": \"$TIMESTAMP\"," >> /tmp/baseline.json
          echo "  \"branch\": \"${{ inputs.baseline_branch || 'main' }}\"," >> /tmp/baseline.json
          echo "  \"commit\": \"${{ github.sha }}\"," >> /tmp/baseline.json
          echo "  \"violations\": [" >> /tmp/baseline.json

          VIOLATIONS_COUNT=0
          FIRST_VIOLATION=true

          # Helper function to compute 5-line context hash
          # Uses sha256(rule_id + ":" + normalized_5_line_context)
          compute_hash() {
            local rule_id="$1"
            local file="$2"
            local line="$3"

            # Get file content if it exists
            if [ ! -f "$file" ]; then
              echo "no-file-hash-$(echo "$rule_id:$file:$line" | sha256sum | cut -d' ' -f1)"
              return
            fi

            # Get 5-line context (line - 2 to line + 2)
            local start_line=$((line > 2 ? line - 2 : 1))
            local end_line=$((line + 2))

            # Extract lines and normalize whitespace (trim, collapse spaces)
            local context=$(sed -n "${start_line},${end_line}p" "$file" 2>/dev/null | \
              sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
              tr -s '[:space:]' ' ' | \
              tr '\n' ' ' | \
              sed 's/[[:space:]]*$//')

            # Compute hash
            echo "$rule_id:$context" | sha256sum | cut -d' ' -f1
          }

          # Function to add violation to baseline
          add_violation() {
            local rule="$1"
            local file="$2"
            local line="$3"
            local gate="$4"
            local message="$5"

            local hash=$(compute_hash "$rule" "$file" "$line")

            if [ "$FIRST_VIOLATION" = "false" ]; then
              echo "," >> /tmp/baseline.json
            fi
            FIRST_VIOLATION=false

            cat >> /tmp/baseline.json << VIOLATION_EOF
    {
      "rule": "$rule",
      "file": "$file",
      "line_hint": $line,
      "hash": "$hash",
      "gate": "$gate",
      "message": $(echo "$message" | head -c 200 | node -e "console.log(JSON.stringify(require('fs').readFileSync(0, 'utf8').trim()))"),
      "first_seen": "$TIMESTAMP"
    }
VIOLATION_EOF
            VIOLATIONS_COUNT=$((VIOLATIONS_COUNT + 1))
          }

          echo "### Scanning for violations..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ==========================================
          # TypeScript Violations
          # ==========================================
          TSC_VIOLATIONS=0
          if [ -f tsconfig.json ] && npx tsc --version > /dev/null 2>&1; then
            echo "**TypeScript:** Scanning..." >> $GITHUB_STEP_SUMMARY

            TSC_OUTPUT=$(npx tsc --noEmit 2>&1 || true)

            # Parse TypeScript errors: file(line,col): error TSxxxx: message
            while IFS= read -r line; do
              if [[ "$line" =~ ^([^(]+)\(([0-9]+),([0-9]+)\):\ error\ (TS[0-9]+):\ (.*)$ ]]; then
                FILE="${BASH_REMATCH[1]}"
                LINE_NUM="${BASH_REMATCH[2]}"
                RULE="${BASH_REMATCH[4]}"
                MSG="${BASH_REMATCH[5]}"

                add_violation "$RULE" "$FILE" "$LINE_NUM" "typescript" "$MSG"
                TSC_VIOLATIONS=$((TSC_VIOLATIONS + 1))
              fi
            done <<< "$TSC_OUTPUT"

            echo "**TypeScript:** $TSC_VIOLATIONS violation(s)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**TypeScript:** Skipped (not configured)" >> $GITHUB_STEP_SUMMARY
          fi

          # ==========================================
          # ESLint Violations
          # ==========================================
          ESLINT_VIOLATIONS=0

          # Check for ESLint config
          ESLINT_CONFIG=""
          for config in .eslintrc .eslintrc.js .eslintrc.cjs .eslintrc.json .eslintrc.yml .eslintrc.yaml eslint.config.js eslint.config.mjs eslint.config.cjs; do
            if [ -f "$config" ]; then
              ESLINT_CONFIG="$config"
              break
            fi
          done

          # Also check package.json for eslintConfig
          if [ -z "$ESLINT_CONFIG" ] && [ -f package.json ]; then
            if node -e "const pkg = require('./package.json'); if (pkg.eslintConfig) process.exit(0); else process.exit(1);" 2>/dev/null; then
              ESLINT_CONFIG="package.json"
            fi
          fi

          if [ -n "$ESLINT_CONFIG" ] && command -v npx &> /dev/null; then
            echo "**ESLint:** Scanning..." >> $GITHUB_STEP_SUMMARY

            # Get all JS/TS files
            JS_TS_FILES=$(find . -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" -o -name "*.mjs" -o -name "*.cjs" \) \
              -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/dist/*" -not -path "*/build/*" 2>/dev/null | head -1000)

            if [ -n "$JS_TS_FILES" ]; then
              ESLINT_OUTPUT=$(echo "$JS_TS_FILES" | xargs npx eslint --format json 2>/dev/null || echo "[]")

              # Parse ESLint JSON output
              echo "$ESLINT_OUTPUT" | node -e "
                const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                const violations = [];
                (Array.isArray(data) ? data : []).forEach(file => {
                  (file.messages || []).forEach(msg => {
                    if (msg.severity >= 1) {  // 1 = warning, 2 = error
                      violations.push({
                        file: file.filePath.replace(process.cwd() + '/', ''),
                        line: msg.line || 1,
                        rule: msg.ruleId || 'unknown',
                        message: msg.message || ''
                      });
                    }
                  });
                });
                violations.forEach(v => {
                  console.log(JSON.stringify(v));
                });
              " 2>/dev/null | while IFS= read -r violation; do
                FILE=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).file)")
                LINE_NUM=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).line)")
                RULE=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).rule)")
                MSG=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).message)")

                add_violation "eslint:$RULE" "$FILE" "$LINE_NUM" "eslint" "$MSG"
                ESLINT_VIOLATIONS=$((ESLINT_VIOLATIONS + 1))
              done

              echo "**ESLint:** $ESLINT_VIOLATIONS violation(s)" >> $GITHUB_STEP_SUMMARY
            else
              echo "**ESLint:** No files to scan" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**ESLint:** Skipped (not configured)" >> $GITHUB_STEP_SUMMARY
          fi

          # ==========================================
          # Semgrep Violations
          # ==========================================
          SEMGREP_VIOLATIONS=0
          if command -v semgrep &> /dev/null || pip install semgrep > /dev/null 2>&1; then
            echo "**Semgrep:** Scanning..." >> $GITHUB_STEP_SUMMARY

            SEMGREP_OUTPUT=$(semgrep scan --config=p/security-audit --json . 2>/dev/null || echo '{"results":[]}')

            echo "$SEMGREP_OUTPUT" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              (data.results || []).forEach(result => {
                console.log(JSON.stringify({
                  file: result.path,
                  line: result.start?.line || 1,
                  rule: result.check_id,
                  message: result.extra?.message || 'Security finding'
                }));
              });
            " 2>/dev/null | while IFS= read -r violation; do
              FILE=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).file)")
              LINE_NUM=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).line)")
              RULE=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).rule)")
              MSG=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).message)")

              add_violation "semgrep:$RULE" "$FILE" "$LINE_NUM" "semgrep" "$MSG"
              SEMGREP_VIOLATIONS=$((SEMGREP_VIOLATIONS + 1))
            done

            echo "**Semgrep:** $SEMGREP_VIOLATIONS violation(s)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Semgrep:** Skipped (not available)" >> $GITHUB_STEP_SUMMARY
          fi

          # ==========================================
          # Gitleaks Violations (Secrets)
          # ==========================================
          GITLEAKS_VIOLATIONS=0
          if command -v gitleaks &> /dev/null; then
            echo "**Gitleaks:** Scanning..." >> $GITHUB_STEP_SUMMARY

            GITLEAKS_OUTPUT=$(gitleaks detect --source . --report-format json --report-path /tmp/gitleaks-baseline.json --no-git 2>&1 || true)

            if [ -f /tmp/gitleaks-baseline.json ]; then
              node -e "
                const data = JSON.parse(require('fs').readFileSync('/tmp/gitleaks-baseline.json', 'utf8'));
                (Array.isArray(data) ? data : []).forEach(finding => {
                  console.log(JSON.stringify({
                    file: finding.File,
                    line: finding.StartLine || 1,
                    rule: finding.RuleID,
                    message: finding.Description || 'Potential secret'
                  }));
                });
              " 2>/dev/null | while IFS= read -r violation; do
                FILE=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).file)")
                LINE_NUM=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).line)")
                RULE=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).rule)")
                MSG=$(echo "$violation" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).message)")

                add_violation "gitleaks:$RULE" "$FILE" "$LINE_NUM" "gitleaks" "$MSG"
                GITLEAKS_VIOLATIONS=$((GITLEAKS_VIOLATIONS + 1))
              done
            fi

            echo "**Gitleaks:** $GITLEAKS_VIOLATIONS finding(s)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Gitleaks:** Skipped (not available)" >> $GITHUB_STEP_SUMMARY
          fi

          # Close JSON array and object
          echo "" >> /tmp/baseline.json
          echo "  ]," >> /tmp/baseline.json
          echo "  \"summary\": {" >> /tmp/baseline.json
          echo "    \"total\": $VIOLATIONS_COUNT," >> /tmp/baseline.json
          echo "    \"typescript\": $TSC_VIOLATIONS," >> /tmp/baseline.json
          echo "    \"eslint\": $ESLINT_VIOLATIONS," >> /tmp/baseline.json
          echo "    \"semgrep\": $SEMGREP_VIOLATIONS," >> /tmp/baseline.json
          echo "    \"gitleaks\": $GITLEAKS_VIOLATIONS" >> /tmp/baseline.json
          echo "  }" >> /tmp/baseline.json
          echo "}" >> /tmp/baseline.json

          # Validate JSON and format
          if node -e "JSON.parse(require('fs').readFileSync('/tmp/baseline.json', 'utf8'))" 2>/dev/null; then
            # Format JSON nicely
            node -e "
              const data = JSON.parse(require('fs').readFileSync('/tmp/baseline.json', 'utf8'));
              console.log(JSON.stringify(data, null, 2));
            " > "$BASELINE_FILE"
            echo "baseline_valid=true" >> $GITHUB_OUTPUT
          else
            echo "Error: Generated baseline JSON is invalid"
            cat /tmp/baseline.json
            echo "baseline_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Violations |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | $TSC_VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | $ESLINT_VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | $SEMGREP_VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | $GITLEAKS_VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$VIOLATIONS_COUNT** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":white_check_mark: Baseline saved to \`.hawky/baseline.json\`" >> $GITHUB_STEP_SUMMARY

          echo "violations_count=$VIOLATIONS_COUNT" >> $GITHUB_OUTPUT

      - name: Commit Baseline
        if: steps.baseline.outputs.baseline_valid == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Configure git
          git config user.name "Hawky Bot"
          git config user.email "hawky-bot@users.noreply.github.com"

          # Check if baseline changed
          if git diff --quiet .hawky/baseline.json 2>/dev/null; then
            echo "No changes to baseline"
            echo "## Baseline Unchanged" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The baseline file has not changed since the last generation." >> $GITHUB_STEP_SUMMARY
          else
            # Stage and commit
            git add .hawky/baseline.json

            COMMIT_MSG="chore(hawky): update baseline

Generated by Hawky baseline scan.
Branch: ${{ inputs.baseline_branch || 'main' }}
Violations: ${{ steps.baseline.outputs.violations_count }}
Mode: ${{ inputs.mode }}"

            git commit -m "$COMMIT_MSG"

            # Push to the baseline branch
            git push origin HEAD:${{ inputs.baseline_branch || 'main' }}

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":rocket: **Baseline committed and pushed to \`${{ inputs.baseline_branch || 'main' }}\`**" >> $GITHUB_STEP_SUMMARY
          fi

  # Main review job - runs on pull_request or workflow_dispatch with review mode
  hawky-review:
    name: Hawky Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'review') }}

    steps:
      # Checkout with full history for git analysis (E005)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache node_modules keyed on lock file
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Cache TypeScript incremental build info
      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: |
            .tsbuildinfo
            **/tsconfig.tsbuildinfo
          key: ${{ runner.os }}-tsbuild-${{ hashFiles('**/tsconfig.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-tsbuild-${{ hashFiles('**/tsconfig.json') }}-
            ${{ runner.os }}-tsbuild-

      # PR Metadata - Available for future gates
      - name: PR Metadata
        id: pr-metadata
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Branch: ${{ github.head_ref }}"
          echo "Base Branch: ${{ github.base_ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "head_ref=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          echo "base_ref=${{ github.base_ref }}" >> $GITHUB_OUTPUT

      # S008: Parse .hawky.yml configuration file
      - name: Parse Hawky Configuration
        id: config
        run: |
          echo "## Hawky Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Look for config file
          CONFIG_FILE=""
          if [ -f ".hawky.yml" ]; then
            CONFIG_FILE=".hawky.yml"
          elif [ -f ".hawky.yaml" ]; then
            CONFIG_FILE=".hawky.yaml"
          fi

          if [ -z "$CONFIG_FILE" ]; then
            echo "No .hawky.yml found — using defaults"
            echo ":gear: **Using defaults** — No configuration file found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Create a \`.hawky.yml\` file to customize gate behavior._" >> $GITHUB_STEP_SUMMARY
            echo "config_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found configuration: $CONFIG_FILE"
          echo ":gear: **Using config from:** \`$CONFIG_FILE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "config_found=true" >> $GITHUB_OUTPUT

          # Parse YAML using Node.js (js-yaml or inline parsing)
          # We use a lightweight inline parser to avoid extra dependencies
          node -e "
            const fs = require('fs');
            const yaml = fs.readFileSync('$CONFIG_FILE', 'utf8');

            // Simple YAML parser for our flat config structure
            const config = {};
            let currentGate = null;

            yaml.split('\n').forEach(line => {
              // Skip comments and empty lines
              if (line.trim().startsWith('#') || line.trim() === '') return;

              // Top-level key (no indentation)
              const topMatch = line.match(/^(\w+):\s*(.*)$/);
              if (topMatch) {
                const [, key, value] = topMatch;
                if (key === 'gates') {
                  currentGate = null;
                } else if (key === 'fail_fast') {
                  config.fail_fast = value.trim() === 'true';
                }
                return;
              }

              // Gate name (2-space indent)
              const gateMatch = line.match(/^  (\w+):\s*$/);
              if (gateMatch) {
                currentGate = gateMatch[1];
                config[currentGate] = {};
                return;
              }

              // Gate property (4-space indent)
              const propMatch = line.match(/^    (\w+):\s*(.+)$/);
              if (propMatch && currentGate) {
                const [, prop, value] = propMatch;
                let parsedValue = value.trim();

                // Handle booleans
                if (parsedValue === 'true') parsedValue = true;
                else if (parsedValue === 'false') parsedValue = false;
                // Handle numbers
                else if (/^\d+$/.test(parsedValue)) parsedValue = parseInt(parsedValue, 10);
                // Handle quoted strings
                else if (/^[\"'].*[\"']$/.test(parsedValue)) parsedValue = parsedValue.slice(1, -1);

                config[currentGate][prop] = parsedValue;
              }
            });

            // Output environment variables for each setting
            const envVars = [];

            // Global fail_fast
            if (config.fail_fast !== undefined) {
              envVars.push('HAWKY_FAIL_FAST=' + (config.fail_fast ? 'true' : 'false'));
            }

            // Per-gate settings
            const gates = ['typescript', 'build', 'test', 'eslint', 'semgrep', 'gitleaks'];
            gates.forEach(gate => {
              const gateConfig = config[gate] || {};
              const prefix = 'HAWKY_GATE_' + gate.toUpperCase();

              if (gateConfig.enabled !== undefined) {
                envVars.push(prefix + '_ENABLED=' + (gateConfig.enabled ? 'true' : 'false'));
              }
              if (gateConfig.blocking !== undefined) {
                envVars.push(prefix + '_BLOCKING=' + (gateConfig.blocking ? 'true' : 'false'));
              }
              if (gateConfig.timeout !== undefined) {
                envVars.push(prefix + '_TIMEOUT=' + gateConfig.timeout);
              }
              if (gateConfig.command !== undefined) {
                envVars.push(prefix + '_COMMAND=' + gateConfig.command);
              }
              // S009: Semgrep-specific rulesets setting
              if (gateConfig.rulesets !== undefined) {
                envVars.push(prefix + '_RULESETS=' + gateConfig.rulesets);
              }
            });

            // Output to GITHUB_ENV (each on new line)
            envVars.forEach(v => console.log(v));

            // Also output to summary
            console.error('Config parsed:');
            console.error(JSON.stringify(config, null, 2));
          " >> $GITHUB_ENV 2>> $GITHUB_STEP_SUMMARY

          # Show parsed config in summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Raw config file</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
          cat "$CONFIG_FILE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      # S081: Load baseline for comparison
      - name: Load Baseline
        id: baseline
        run: |
          BASELINE_FILE=".hawky/baseline.json"

          if [ ! -f "$BASELINE_FILE" ]; then
            echo "No baseline found — all violations will be treated as new"
            echo "baseline_found=false" >> $GITHUB_OUTPUT
            echo "baseline_count=0" >> $GITHUB_OUTPUT
            # Create empty baseline hashes file
            echo "[]" > /tmp/baseline_hashes.json
          else
            echo "Baseline found: $BASELINE_FILE"
            echo "baseline_found=true" >> $GITHUB_OUTPUT

            # Extract violation count and hashes
            BASELINE_COUNT=$(node -e "
              const data = JSON.parse(require('fs').readFileSync('$BASELINE_FILE', 'utf8'));
              console.log(data.summary?.total || data.violations?.length || 0);
            ")
            echo "baseline_count=$BASELINE_COUNT" >> $GITHUB_OUTPUT

            # Extract all hashes for quick lookup
            node -e "
              const data = JSON.parse(require('fs').readFileSync('$BASELINE_FILE', 'utf8'));
              const hashes = (data.violations || []).map(v => v.hash);
              console.log(JSON.stringify(hashes));
            " > /tmp/baseline_hashes.json

            echo "Loaded $BASELINE_COUNT baseline violation(s)"

            # Show baseline info in summary
            echo "## Baseline" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":bookmark: **Baseline loaded** — $BASELINE_COUNT existing violation(s)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Show baseline summary
            node -e "
              const data = JSON.parse(require('fs').readFileSync('$BASELINE_FILE', 'utf8'));
              console.log('| Gate | Existing |');
              console.log('|------|----------|');
              console.log('| TypeScript | ' + (data.summary?.typescript || 0) + ' |');
              console.log('| ESLint | ' + (data.summary?.eslint || 0) + ' |');
              console.log('| Semgrep | ' + (data.summary?.semgrep || 0) + ' |');
              console.log('| Gitleaks | ' + (data.summary?.gitleaks || 0) + ' |');
            " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Only NEW violations (not in baseline) will block merge._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Create baseline hash lookup script for use by gates
          cat > /tmp/check_baseline.js << 'BASELINE_SCRIPT'
          const crypto = require('crypto');
          const fs = require('fs');

          // Load baseline hashes
          const baselineHashes = new Set(JSON.parse(fs.readFileSync('/tmp/baseline_hashes.json', 'utf8')));

          // Compute hash for a violation using 5-line context
          function computeHash(ruleId, filePath, lineNum) {
            try {
              if (!fs.existsSync(filePath)) {
                return crypto.createHash('sha256').update(`no-file:${ruleId}:${filePath}:${lineNum}`).digest('hex');
              }

              const content = fs.readFileSync(filePath, 'utf8').split('\n');
              const startLine = Math.max(0, lineNum - 3); // 0-indexed, so -3 for line-2
              const endLine = Math.min(content.length, lineNum + 2); // +2 for line+2

              // Get 5-line context, normalize whitespace
              const context = content.slice(startLine, endLine)
                .map(line => line.trim().replace(/\s+/g, ' '))
                .join(' ')
                .trim();

              return crypto.createHash('sha256').update(`${ruleId}:${context}`).digest('hex');
            } catch (e) {
              return crypto.createHash('sha256').update(`error:${ruleId}:${filePath}:${lineNum}`).digest('hex');
            }
          }

          // Check if violation is in baseline
          function isInBaseline(ruleId, filePath, lineNum) {
            const hash = computeHash(ruleId, filePath, lineNum);
            return baselineHashes.has(hash);
          }

          // Export for use
          module.exports = { computeHash, isInBaseline, baselineHashes };

          // CLI mode: check_baseline.js <rule> <file> <line>
          if (require.main === module) {
            const [,, rule, file, line] = process.argv;
            if (rule && file && line) {
              const inBaseline = isInBaseline(rule, file, parseInt(line));
              console.log(inBaseline ? 'baseline' : 'new');
              process.exit(inBaseline ? 0 : 1);
            }
          }
          BASELINE_SCRIPT

      # Install dependencies (if not cached)
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      # S002: TypeScript Strict Gate
      # S008: Respects HAWKY_GATE_TYPESCRIPT_ENABLED config
      # S081: Baseline comparison - only NEW errors block merge
      - name: TypeScript Strict Gate
        id: typecheck
        if: ${{ env.HAWKY_GATE_TYPESCRIPT_ENABLED != 'false' }}
        run: |
          echo "## TypeScript Strict Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if TypeScript is available
          if ! [ -f tsconfig.json ]; then
            echo "No tsconfig.json found — skipping TypeScript check"
            echo ":white_check_mark: **Skipped** — No tsconfig.json found" >> $GITHUB_STEP_SUMMARY
            echo "tsc_status=skipped" >> $GITHUB_OUTPUT
            echo "tsc_errors=0" >> $GITHUB_OUTPUT
            echo "tsc_new_errors=0" >> $GITHUB_OUTPUT
            echo "tsc_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if tsc is available
          if ! npx tsc --version > /dev/null 2>&1; then
            echo "TypeScript not installed — skipping TypeScript check"
            echo ":white_check_mark: **Skipped** — TypeScript not installed" >> $GITHUB_STEP_SUMMARY
            echo "tsc_status=skipped" >> $GITHUB_OUTPUT
            echo "tsc_errors=0" >> $GITHUB_OUTPUT
            echo "tsc_new_errors=0" >> $GITHUB_OUTPUT
            echo "tsc_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running tsc --noEmit..."
          TSC_VERSION=$(npx tsc --version)
          echo "TypeScript version: $TSC_VERSION"

          # Run tsc and capture output
          TSC_START=$(date +%s)
          set +e
          TSC_OUTPUT=$(npx tsc --noEmit 2>&1)
          TSC_EXIT_CODE=$?
          set -e
          TSC_END=$(date +%s)
          TSC_TIME=$((TSC_END - TSC_START))

          # Count errors
          ERROR_COUNT=$(echo "$TSC_OUTPUT" | grep -c "error TS" || echo "0")

          # Output for summary
          echo "tsc_time=${TSC_TIME}s" >> $GITHUB_OUTPUT
          echo "tsc_errors=$ERROR_COUNT" >> $GITHUB_OUTPUT

          if [ "$TSC_EXIT_CODE" -eq 0 ]; then
            echo ":white_check_mark: **Passed** — No type errors" >> $GITHUB_STEP_SUMMARY
            echo "TypeScript check passed — no errors"
            echo "tsc_status=passed" >> $GITHUB_OUTPUT
            echo "tsc_new_errors=0" >> $GITHUB_OUTPUT
            echo "tsc_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # S081: Parse errors and classify as new vs existing (baseline)
          NEW_ERRORS=0
          EXISTING_ERRORS=0
          NEW_ERROR_LIST=""
          EXISTING_ERROR_LIST=""

          # Process each error with baseline check
          while IFS= read -r line; do
            # Match TypeScript error format: file(line,col): error TSxxxx: message
            if [[ "$line" =~ ^([^(]+)\(([0-9]+),([0-9]+)\):\ error\ (TS[0-9]+):\ (.*)$ ]]; then
              FILE="${BASH_REMATCH[1]}"
              LINE_NUM="${BASH_REMATCH[2]}"
              COL="${BASH_REMATCH[3]}"
              CODE="${BASH_REMATCH[4]}"
              MSG="${BASH_REMATCH[5]}"

              # Check if this error is in the baseline
              IN_BASELINE=$(node /tmp/check_baseline.js "$CODE" "$FILE" "$LINE_NUM" 2>/dev/null && echo "yes" || echo "no")

              if [ "$IN_BASELINE" = "yes" ]; then
                EXISTING_ERRORS=$((EXISTING_ERRORS + 1))
                EXISTING_ERROR_LIST="$EXISTING_ERROR_LIST\n$FILE($LINE_NUM,$COL): $CODE: $MSG"
              else
                NEW_ERRORS=$((NEW_ERRORS + 1))
                NEW_ERROR_LIST="$NEW_ERROR_LIST\n$FILE($LINE_NUM,$COL): $CODE: $MSG"
                # Only annotate NEW errors as blocking
                echo "::error file=$FILE,line=$LINE_NUM,col=$COL,title=TypeScript $CODE::$MSG"
              fi
            fi
          done <<< "$TSC_OUTPUT"

          echo "tsc_new_errors=$NEW_ERRORS" >> $GITHUB_OUTPUT
          echo "tsc_existing_errors=$EXISTING_ERRORS" >> $GITHUB_OUTPUT

          # Report based on new vs existing
          if [ "$NEW_ERRORS" -gt 0 ]; then
            echo ":x: **Failed** — $NEW_ERRORS NEW type error(s)" >> $GITHUB_STEP_SUMMARY
            if [ "$EXISTING_ERRORS" -gt 0 ]; then
              echo ":white_circle: **Existing** — $EXISTING_ERRORS error(s) in baseline" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### New Errors (blocking)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo -e "$NEW_ERROR_LIST" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

            if [ "$EXISTING_ERRORS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Existing Errors (in baseline, not blocking)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo -e "$EXISTING_ERROR_LIST" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi

            echo ""
            echo "TypeScript check failed with $NEW_ERRORS NEW error(s) ($EXISTING_ERRORS existing)"
            echo "tsc_status=failed" >> $GITHUB_OUTPUT
            exit 1
          elif [ "$EXISTING_ERRORS" -gt 0 ]; then
            # Only existing errors - pass (baseline mode)
            echo ":white_check_mark: **Passed** — No NEW type errors" >> $GITHUB_STEP_SUMMARY
            echo ":white_circle: **Existing** — $EXISTING_ERRORS error(s) in baseline (not blocking)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Existing Errors (in baseline)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo -e "$EXISTING_ERROR_LIST" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Run \`hawky baseline --update\` to refresh the baseline after fixing issues._" >> $GITHUB_STEP_SUMMARY

            echo "TypeScript check passed — $EXISTING_ERRORS existing error(s) in baseline"
            echo "tsc_status=passed" >> $GITHUB_OUTPUT
            exit 0
          fi

      # S003: Build Gate
      # S008: Respects HAWKY_GATE_BUILD_ENABLED and HAWKY_GATE_TYPESCRIPT_BLOCKING configs
      # Skipped if TypeScript gate failed (fail-fast mode) AND TypeScript is blocking
      - name: Build Gate
        id: build
        if: ${{ env.HAWKY_GATE_BUILD_ENABLED != 'false' && (steps.typecheck.outputs.tsc_status != 'failed' || env.HAWKY_GATE_TYPESCRIPT_BLOCKING != 'true' || env.HAWKY_FAIL_FAST != 'true') }}
        run: |
          echo "## Build Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BUILD_CMD=""
          BUILD_SOURCE=""

          # Priority 0: Check for config command override (S008)
          if [ -n "$HAWKY_GATE_BUILD_COMMAND" ]; then
            BUILD_CMD="$HAWKY_GATE_BUILD_COMMAND"
            BUILD_SOURCE=".hawky.yml"
          fi

          # Priority 1: Check .claude/COMMANDS.md for build command
          if [ -z "$BUILD_CMD" ] && [ -f ".claude/COMMANDS.md" ]; then
            # Look for build command in COMMANDS.md (format: "build: <command>" or "Build: <command>")
            COMMANDS_BUILD=$(grep -iE "^(build|Build):\s*" .claude/COMMANDS.md | head -1 | sed 's/^[Bb]uild:\s*//' | xargs)
            if [ -n "$COMMANDS_BUILD" ]; then
              BUILD_CMD="$COMMANDS_BUILD"
              BUILD_SOURCE=".claude/COMMANDS.md"
            fi
          fi

          # Priority 2: Check package.json for build script
          if [ -z "$BUILD_CMD" ] && [ -f "package.json" ]; then
            # Check if build script exists in package.json
            if node -e "const pkg = require('./package.json'); if (pkg.scripts && pkg.scripts.build) { console.log(pkg.scripts.build); process.exit(0); } else { process.exit(1); }" 2>/dev/null; then
              BUILD_CMD="npm run build"
              BUILD_SOURCE="package.json"
            fi
          fi

          # Skip if no build command found
          if [ -z "$BUILD_CMD" ]; then
            echo "No build command found — skipping build gate"
            echo ":white_check_mark: **Skipped** — No build command found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Checked: .claude/COMMANDS.md, package.json_" >> $GITHUB_STEP_SUMMARY
            echo "build_status=skipped" >> $GITHUB_OUTPUT
            echo "build_warnings=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Build command: $BUILD_CMD (from $BUILD_SOURCE)"
          echo "**Source:** \`$BUILD_SOURCE\`" >> $GITHUB_STEP_SUMMARY
          echo "**Command:** \`$BUILD_CMD\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run build and capture timing
          BUILD_START=$(date +%s)
          set +e
          BUILD_OUTPUT=$(eval "$BUILD_CMD" 2>&1)
          BUILD_EXIT_CODE=$?
          set -e
          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))

          echo "**Build time:** ${BUILD_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output build time for summary
          echo "build_time=${BUILD_TIME}s" >> $GITHUB_OUTPUT

          # Collect warnings (common patterns across build tools)
          WARNING_COUNT=$(echo "$BUILD_OUTPUT" | grep -ciE "(warning|warn\b|⚠)" || echo "0")

          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "### Warnings ($WARNING_COUNT)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$BUILD_OUTPUT" | grep -iE "(warning|warn\b|⚠)" | head -50 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::warning::Build completed with $WARNING_COUNT warning(s)"
          fi

          # Check for build failure
          if [ "$BUILD_EXIT_CODE" -ne 0 ]; then
            echo ":x: **Failed** — Build exited with code $BUILD_EXIT_CODE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Build Output" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$BUILD_OUTPUT" | tail -100 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "Build failed with exit code $BUILD_EXIT_CODE"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            echo "build_warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo ":white_check_mark: **Passed** — Build completed in ${BUILD_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "build_status=passed" >> $GITHUB_OUTPUT
          echo "build_warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_$WARNING_COUNT warning(s) collected (non-blocking)_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Build passed in ${BUILD_TIME}s ($WARNING_COUNT warnings)"

      # S004: Test Gate
      # S008: Respects HAWKY_GATE_TEST_ENABLED and blocking configs
      # Skipped if any prior blocking gate failed (fail-fast mode)
      - name: Test Gate
        id: test
        if: ${{ env.HAWKY_GATE_TEST_ENABLED != 'false' && ((steps.typecheck.outputs.tsc_status != 'failed' || env.HAWKY_GATE_TYPESCRIPT_BLOCKING != 'true') && (steps.build.outputs.build_status != 'failed' || env.HAWKY_GATE_BUILD_BLOCKING != 'true') || env.HAWKY_FAIL_FAST != 'true') }}
        run: |
          echo "## Test Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TEST_CMD=""
          TEST_SOURCE=""

          # Priority 0: Check for config command override (S008)
          if [ -n "$HAWKY_GATE_TEST_COMMAND" ]; then
            TEST_CMD="$HAWKY_GATE_TEST_COMMAND"
            TEST_SOURCE=".hawky.yml"
          fi

          # Priority 1: Check .claude/COMMANDS.md for test command
          if [ -z "$TEST_CMD" ] && [ -f ".claude/COMMANDS.md" ]; then
            # Look for test command in COMMANDS.md (format: "test: <command>" or "Test: <command>")
            COMMANDS_TEST=$(grep -iE "^(test|Test):\s*" .claude/COMMANDS.md | head -1 | sed 's/^[Tt]est:\s*//' | xargs)
            if [ -n "$COMMANDS_TEST" ]; then
              TEST_CMD="$COMMANDS_TEST"
              TEST_SOURCE=".claude/COMMANDS.md"
            fi
          fi

          # Priority 2: Check package.json for test script
          if [ -z "$TEST_CMD" ] && [ -f "package.json" ]; then
            # Check if test script exists in package.json (and isn't the default error script)
            TEST_SCRIPT=$(node -e "const pkg = require('./package.json'); if (pkg.scripts && pkg.scripts.test && !pkg.scripts.test.includes('Error: no test specified')) { console.log(pkg.scripts.test); }" 2>/dev/null || echo "")
            if [ -n "$TEST_SCRIPT" ]; then
              TEST_CMD="npm test"
              TEST_SOURCE="package.json"
            fi
          fi

          # Skip if no test command found
          if [ -z "$TEST_CMD" ]; then
            echo "No test command found — skipping test gate"
            echo ":white_check_mark: **Skipped** — No test command found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Checked: .claude/COMMANDS.md, package.json_" >> $GITHUB_STEP_SUMMARY
            echo "test_status=skipped" >> $GITHUB_OUTPUT
            echo "test_total=0" >> $GITHUB_OUTPUT
            echo "test_passed=0" >> $GITHUB_OUTPUT
            echo "test_failed=0" >> $GITHUB_OUTPUT
            echo "test_skipped=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Test command: $TEST_CMD (from $TEST_SOURCE)"
          echo "**Source:** \`$TEST_SOURCE\`" >> $GITHUB_STEP_SUMMARY
          echo "**Command:** \`$TEST_CMD\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run tests and capture output
          TEST_START=$(date +%s)
          set +e
          TEST_OUTPUT=$(eval "$TEST_CMD" 2>&1)
          TEST_EXIT_CODE=$?
          set -e
          TEST_END=$(date +%s)
          TEST_TIME=$((TEST_END - TEST_START))

          echo "**Test time:** ${TEST_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output test time for summary
          echo "test_time=${TEST_TIME}s" >> $GITHUB_OUTPUT

          # Parse test results - support multiple test runners
          # Jest/Vitest format: "Tests: X passed, Y failed, Z skipped, N total"
          # or "Test Suites: ..." followed by "Tests: ..."
          PASSED=0
          FAILED=0
          SKIPPED=0
          TOTAL=0

          # Try Jest/Vitest format first
          if echo "$TEST_OUTPUT" | grep -qE "Tests:.*passed"; then
            PASSED=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) passed" | grep -oE "[0-9]+" | tail -1 || echo "0")
            FAILED=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) failed" | grep -oE "[0-9]+" | tail -1 || echo "0")
            SKIPPED=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) (skipped|todo)" | grep -oE "[0-9]+" | tail -1 || echo "0")
            TOTAL=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) total" | grep -oE "[0-9]+" | tail -1 || echo "0")
          # Try TAP format (used by many Node test runners)
          elif echo "$TEST_OUTPUT" | grep -qE "^(ok|not ok) [0-9]+"; then
            PASSED=$(echo "$TEST_OUTPUT" | grep -cE "^ok [0-9]+" || echo "0")
            FAILED=$(echo "$TEST_OUTPUT" | grep -cE "^not ok [0-9]+" || echo "0")
            SKIPPED=$(echo "$TEST_OUTPUT" | grep -cE "^ok [0-9]+.*# (skip|todo)" || echo "0")
            TOTAL=$((PASSED + FAILED))
          # Try Mocha format: "X passing" "Y failing"
          elif echo "$TEST_OUTPUT" | grep -qE "[0-9]+ passing"; then
            PASSED=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) passing" | grep -oE "[0-9]+" | tail -1 || echo "0")
            FAILED=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) failing" | grep -oE "[0-9]+" | tail -1 || echo "0")
            SKIPPED=$(echo "$TEST_OUTPUT" | grep -oE "([0-9]+) pending" | grep -oE "[0-9]+" | tail -1 || echo "0")
            TOTAL=$((PASSED + FAILED + SKIPPED))
          fi

          # Ensure numeric values
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          TOTAL=${TOTAL:-0}

          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract failed test names and create annotations
          if [ "$FAILED" -gt 0 ] || [ "$TEST_EXIT_CODE" -ne 0 ]; then
            echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Parse failed test names - support Jest/Vitest format
            # Look for "FAIL" lines or "✕" or "✖" markers
            FAILED_TESTS=$(echo "$TEST_OUTPUT" | grep -E "(FAIL |✕|✖|not ok [0-9]+)" | head -20)

            if [ -n "$FAILED_TESTS" ]; then
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "$FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

              # Create GitHub annotations for failed tests
              # Parse Jest format: "FAIL path/to/file.test.ts"
              echo "$TEST_OUTPUT" | grep -E "^FAIL " | while IFS= read -r line; do
                FILE=$(echo "$line" | sed 's/^FAIL //' | xargs)
                if [ -f "$FILE" ]; then
                  echo "::error file=$FILE,title=Test Failed::Test suite failed"
                fi
              done

              # Parse individual test failures - "● Test Suite › test name"
              echo "$TEST_OUTPUT" | grep -E "^[[:space:]]*●" | while IFS= read -r line; do
                TEST_NAME=$(echo "$line" | sed 's/^[[:space:]]*● //' | xargs)
                echo "::error title=Test Failed::$TEST_NAME"
              done
            else
              # Fallback: show last 50 lines of output
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "$TEST_OUTPUT" | tail -50 >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":x: **Failed** — $FAILED test(s) failed" >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "Tests failed: $FAILED failed, $PASSED passed, $SKIPPED skipped"
            echo "test_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Output status for summary (will be overwritten at end if needed)
          echo "test_status=passed" >> $GITHUB_OUTPUT

          # Check for coverage info
          COVERAGE_LINE=$(echo "$TEST_OUTPUT" | grep -E "(Coverage|coverage|All files)" | head -1 || echo "")
          if [ -n "$COVERAGE_LINE" ]; then
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Try to extract coverage table
            COVERAGE_TABLE=$(echo "$TEST_OUTPUT" | grep -A 20 "Coverage\|All files" | head -25)
            if [ -n "$COVERAGE_TABLE" ]; then
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "$COVERAGE_TABLE" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Compare test count to main branch (if possible)
          # Store current test count for future comparison
          echo "test_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "test_passed=$PASSED" >> $GITHUB_OUTPUT
          echo "test_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "test_skipped=$SKIPPED" >> $GITHUB_OUTPUT

          echo ":white_check_mark: **Passed** — $PASSED tests passed in ${TEST_TIME}s" >> $GITHUB_STEP_SUMMARY
          if [ "$SKIPPED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_$SKIPPED test(s) skipped_" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Tests passed: $PASSED passed, $SKIPPED skipped in ${TEST_TIME}s"

      # S005: ESLint Gate
      # S008: Respects HAWKY_GATE_ESLINT_ENABLED and blocking configs
      # S081: Baseline comparison - only NEW errors block merge
      # Skipped if any prior blocking gate failed (fail-fast mode)
      - name: ESLint Gate
        id: eslint
        if: ${{ env.HAWKY_GATE_ESLINT_ENABLED != 'false' && ((steps.typecheck.outputs.tsc_status != 'failed' || env.HAWKY_GATE_TYPESCRIPT_BLOCKING != 'true') && (steps.build.outputs.build_status != 'failed' || env.HAWKY_GATE_BUILD_BLOCKING != 'true') && (steps.test.outputs.test_status != 'failed' || env.HAWKY_GATE_TEST_BLOCKING != 'true') || env.HAWKY_FAIL_FAST != 'true') }}
        run: |
          echo "## ESLint Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if ESLint config exists (multiple config file formats)
          ESLINT_CONFIG=""
          for config in .eslintrc .eslintrc.js .eslintrc.cjs .eslintrc.json .eslintrc.yml .eslintrc.yaml eslint.config.js eslint.config.mjs eslint.config.cjs; do
            if [ -f "$config" ]; then
              ESLINT_CONFIG="$config"
              break
            fi
          done

          # Also check package.json for eslintConfig field
          if [ -z "$ESLINT_CONFIG" ] && [ -f "package.json" ]; then
            if node -e "const pkg = require('./package.json'); if (pkg.eslintConfig) { process.exit(0); } else { process.exit(1); }" 2>/dev/null; then
              ESLINT_CONFIG="package.json (eslintConfig)"
            fi
          fi

          # Skip if no ESLint config found
          if [ -z "$ESLINT_CONFIG" ]; then
            echo "No ESLint configuration found — skipping ESLint gate"
            echo ":white_check_mark: **Skipped** — No ESLint configuration found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Checked: .eslintrc, .eslintrc.js, .eslintrc.cjs, .eslintrc.json, .eslintrc.yml, .eslintrc.yaml, eslint.config.js, eslint.config.mjs, eslint.config.cjs, package.json (eslintConfig)_" >> $GITHUB_STEP_SUMMARY
            echo "eslint_status=skipped" >> $GITHUB_OUTPUT
            echo "eslint_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_warnings=0" >> $GITHUB_OUTPUT
            echo "eslint_new_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if ESLint is available
          if ! npx eslint --version > /dev/null 2>&1; then
            echo "ESLint not installed — skipping ESLint gate"
            echo ":white_check_mark: **Skipped** — ESLint not installed" >> $GITHUB_STEP_SUMMARY
            echo "eslint_status=skipped" >> $GITHUB_OUTPUT
            echo "eslint_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_warnings=0" >> $GITHUB_OUTPUT
            echo "eslint_new_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          ESLINT_VERSION=$(npx eslint --version)
          echo "ESLint version: $ESLINT_VERSION"
          echo "**Config:** \`$ESLINT_CONFIG\`" >> $GITHUB_STEP_SUMMARY
          echo "**ESLint version:** \`$ESLINT_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get changed files in PR (JS/TS files only)
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|jsx|ts|tsx|mjs|cjs)$' || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No JS/TS files changed in PR — skipping ESLint"
            echo ":white_check_mark: **Skipped** — No JS/TS files changed in PR" >> $GITHUB_STEP_SUMMARY
            echo "eslint_status=skipped" >> $GITHUB_OUTPUT
            echo "eslint_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_warnings=0" >> $GITHUB_OUTPUT
            echo "eslint_new_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count changed files
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | xargs)
          echo "Linting $FILE_COUNT changed file(s)..."
          echo "**Files checked:** $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Filter to only existing files (in case of deletions in the diff)
          FILES_TO_LINT=""
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              FILES_TO_LINT="$FILES_TO_LINT $file"
            fi
          done

          if [ -z "$(echo "$FILES_TO_LINT" | xargs)" ]; then
            echo "All changed files were deleted — skipping ESLint"
            echo ":white_check_mark: **Skipped** — All changed files were deleted" >> $GITHUB_STEP_SUMMARY
            echo "eslint_status=skipped" >> $GITHUB_OUTPUT
            echo "eslint_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_warnings=0" >> $GITHUB_OUTPUT
            echo "eslint_new_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_existing_errors=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Run ESLint with JSON output for parsing
          ESLINT_START=$(date +%s)
          set +e
          ESLINT_OUTPUT=$(npx eslint --format json $FILES_TO_LINT 2>&1)
          ESLINT_EXIT_CODE=$?
          set -e
          ESLINT_END=$(date +%s)
          ESLINT_TIME=$((ESLINT_END - ESLINT_START))

          echo "**Lint time:** ${ESLINT_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output lint time for summary
          echo "eslint_time=${ESLINT_TIME}s" >> $GITHUB_OUTPUT

          # Parse JSON output with S081 baseline comparison
          # ESLint JSON format: [{ filePath, messages: [{ ruleId, severity, message, line, column }], errorCount, warningCount }]
          ERROR_COUNT=0
          WARNING_COUNT=0
          NEW_ERRORS=0
          EXISTING_ERRORS=0

          # Check if output is valid JSON
          if echo "$ESLINT_OUTPUT" | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))" 2>/dev/null; then
            # S081: Parse with baseline check using Node.js
            PARSED=$(echo "$ESLINT_OUTPUT" | node -e "
              const crypto = require('crypto');
              const fs = require('fs');

              // Load baseline hashes
              const baselineHashes = new Set(JSON.parse(fs.readFileSync('/tmp/baseline_hashes.json', 'utf8')));

              // Compute hash for violation
              function computeHash(ruleId, filePath, lineNum) {
                try {
                  if (!fs.existsSync(filePath)) {
                    return crypto.createHash('sha256').update('no-file:eslint:' + ruleId + ':' + filePath + ':' + lineNum).digest('hex');
                  }
                  const content = fs.readFileSync(filePath, 'utf8').split('\n');
                  const startLine = Math.max(0, lineNum - 3);
                  const endLine = Math.min(content.length, lineNum + 2);
                  const context = content.slice(startLine, endLine)
                    .map(line => line.trim().replace(/\s+/g, ' '))
                    .join(' ')
                    .trim();
                  return crypto.createHash('sha256').update('eslint:' + ruleId + ':' + context).digest('hex');
                } catch (e) {
                  return crypto.createHash('sha256').update('error:eslint:' + ruleId + ':' + filePath + ':' + lineNum).digest('hex');
                }
              }

              const data = JSON.parse(fs.readFileSync(0, 'utf8'));
              let totalErrors = 0, warnings = 0, newErrors = 0, existingErrors = 0;
              const newAnnotations = [];
              const existingAnnotations = [];

              data.forEach(file => {
                totalErrors += file.errorCount || 0;
                warnings += file.warningCount || 0;

                (file.messages || []).forEach(msg => {
                  const line = msg.line || 1;
                  const col = msg.column || 1;
                  const rule = msg.ruleId || 'unknown';
                  const message = (msg.message || '').replace(/'/g, \"'\");

                  if (msg.severity === 2) {
                    const hash = computeHash(rule, file.filePath, line);
                    const isBaseline = baselineHashes.has(hash);

                    const annotation = { severity: 'error', file: file.filePath, line, col, rule, message, isBaseline };

                    if (isBaseline) {
                      existingErrors++;
                      existingAnnotations.push(annotation);
                    } else {
                      newErrors++;
                      newAnnotations.push(annotation);
                    }
                  } else {
                    // Warnings are always new (not tracked in baseline)
                    newAnnotations.push({ severity: 'warning', file: file.filePath, line, col, rule, message, isBaseline: false });
                  }
                });
              });

              console.log(JSON.stringify({
                totalErrors,
                warnings,
                newErrors,
                existingErrors,
                newAnnotations,
                existingAnnotations
              }));
            ")

            ERROR_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).totalErrors)")
            WARNING_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).warnings)")
            NEW_ERRORS=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).newErrors)")
            EXISTING_ERRORS=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).existingErrors)")

            # Emit GitHub annotations only for NEW errors (blocking)
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.newAnnotations.forEach(a => {
                console.log('::' + a.severity + ' file=' + a.file + ',line=' + a.line + ',col=' + a.col + ',title=ESLint ' + a.rule + '::' + a.message);
              });
            "
          else
            # JSON parsing failed - likely an ESLint configuration error
            echo "ESLint output was not valid JSON — check configuration"
            echo "::error::ESLint failed to produce valid output. Check configuration."
            echo ":x: **Failed** — ESLint configuration error" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Output" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$ESLINT_OUTPUT" | tail -50 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "eslint_status=failed" >> $GITHUB_OUTPUT
            echo "eslint_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_warnings=0" >> $GITHUB_OUTPUT
            echo "eslint_new_errors=0" >> $GITHUB_OUTPUT
            echo "eslint_existing_errors=0" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Summary table with baseline info
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| New Errors | $NEW_ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| Existing Errors (baseline) | $EXISTING_ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| Warnings | $WARNING_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Store counts for future gates
          echo "eslint_errors=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "eslint_warnings=$WARNING_COUNT" >> $GITHUB_OUTPUT
          echo "eslint_new_errors=$NEW_ERRORS" >> $GITHUB_OUTPUT
          echo "eslint_existing_errors=$EXISTING_ERRORS" >> $GITHUB_OUTPUT

          # Handle results - only NEW errors block merge
          if [ "$NEW_ERRORS" -gt 0 ]; then
            echo ":x: **Failed** — $NEW_ERRORS NEW error(s)" >> $GITHUB_STEP_SUMMARY
            if [ "$EXISTING_ERRORS" -gt 0 ]; then
              echo ":white_circle: **Existing** — $EXISTING_ERRORS error(s) in baseline" >> $GITHUB_STEP_SUMMARY
            fi
            echo "eslint_status=failed" >> $GITHUB_OUTPUT

            # Show NEW errors in summary
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### New Errors (blocking)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const byFile = {};
              data.newAnnotations.filter(a => a.severity === 'error').forEach(a => {
                if (!byFile[a.file]) byFile[a.file] = [];
                byFile[a.file].push(a);
              });
              Object.entries(byFile).forEach(([file, errors]) => {
                console.log('**' + file + '** (' + errors.length + ' error(s))');
                errors.forEach(e => {
                  console.log('- Line ' + e.line + ':' + e.col + ' — ' + e.message + ' (\`' + e.rule + '\`)');
                });
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY

            # Show existing errors in collapsible section
            if [ "$EXISTING_ERRORS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Existing Errors (in baseline, not blocking)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "$PARSED" | node -e "
                const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                const byFile = {};
                data.existingAnnotations.forEach(a => {
                  if (!byFile[a.file]) byFile[a.file] = [];
                  byFile[a.file].push(a);
                });
                Object.entries(byFile).forEach(([file, errors]) => {
                  console.log('**' + file + '** (' + errors.length + ' error(s))');
                  errors.forEach(e => {
                    console.log('- Line ' + e.line + ':' + e.col + ' — ' + e.message + ' (\`' + e.rule + '\`)');
                  });
                  console.log('');
                });
              " >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi

            echo ""
            echo "ESLint failed: $NEW_ERRORS NEW error(s), $EXISTING_ERRORS existing, $WARNING_COUNT warning(s)"
            exit 1
          fi

          # Only existing errors - pass (baseline mode)
          if [ "$EXISTING_ERRORS" -gt 0 ]; then
            echo ":white_check_mark: **Passed** — No NEW errors" >> $GITHUB_STEP_SUMMARY
            echo ":white_circle: **Existing** — $EXISTING_ERRORS error(s) in baseline (not blocking)" >> $GITHUB_STEP_SUMMARY
            echo "eslint_status=passed" >> $GITHUB_OUTPUT

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Existing Errors (in baseline)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const byFile = {};
              data.existingAnnotations.forEach(a => {
                if (!byFile[a.file]) byFile[a.file] = [];
                byFile[a.file].push(a);
              });
              Object.entries(byFile).forEach(([file, errors]) => {
                console.log('**' + file + '** (' + errors.length + ' error(s))');
                errors.forEach(e => {
                  console.log('- Line ' + e.line + ':' + e.col + ' — ' + e.message + ' (\`' + e.rule + '\`)');
                });
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Run \`hawky baseline --update\` to refresh the baseline after fixing issues._" >> $GITHUB_STEP_SUMMARY

            echo "ESLint passed — $EXISTING_ERRORS existing error(s) in baseline"
          elif [ "$WARNING_COUNT" -gt 0 ]; then
            echo ":white_check_mark: **Passed** — $WARNING_COUNT warning(s) (non-blocking)" >> $GITHUB_STEP_SUMMARY
            echo "::warning::ESLint completed with $WARNING_COUNT warning(s)"
            echo "eslint_status=passed" >> $GITHUB_OUTPUT

            # Show warnings in collapsible section
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Warnings ($WARNING_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const byFile = {};
              data.newAnnotations.filter(a => a.severity === 'warning').forEach(a => {
                if (!byFile[a.file]) byFile[a.file] = [];
                byFile[a.file].push(a);
              });
              Object.entries(byFile).forEach(([file, warnings]) => {
                console.log('**' + file + '** (' + warnings.length + ' warning(s))');
                warnings.forEach(w => {
                  console.log('- Line ' + w.line + ':' + w.col + ' — ' + w.message + ' (\`' + w.rule + '\`)');
                });
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY

            echo "ESLint passed with $WARNING_COUNT warning(s)"
          else
            echo ":white_check_mark: **Passed** — No issues found" >> $GITHUB_STEP_SUMMARY
            echo "ESLint passed — no issues"
            echo "eslint_status=passed" >> $GITHUB_OUTPUT
          fi

      # S009: Semgrep Security Scanning Gate
      # Runs Semgrep on changed files with security rulesets
      # Respects HAWKY_GATE_SEMGREP_ENABLED and blocking configs
      # S081: Baseline comparison - only NEW high-severity findings block merge
      - name: Semgrep Security Gate
        id: semgrep
        if: ${{ env.HAWKY_GATE_SEMGREP_ENABLED != 'false' && ((steps.typecheck.outputs.tsc_status != 'failed' || env.HAWKY_GATE_TYPESCRIPT_BLOCKING != 'true') && (steps.build.outputs.build_status != 'failed' || env.HAWKY_GATE_BUILD_BLOCKING != 'true') && (steps.test.outputs.test_status != 'failed' || env.HAWKY_GATE_TEST_BLOCKING != 'true') && (steps.eslint.outputs.eslint_status != 'failed' || env.HAWKY_GATE_ESLINT_BLOCKING != 'true') || env.HAWKY_FAIL_FAST != 'true') }}
        run: |
          echo "## Semgrep Security Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if Semgrep is available
          if ! command -v semgrep &> /dev/null; then
            # Try to install via pip
            echo "Semgrep not found, attempting to install..."
            if command -v pip3 &> /dev/null; then
              pip3 install semgrep --quiet 2>/dev/null || pip install semgrep --quiet 2>/dev/null || true
            elif command -v pip &> /dev/null; then
              pip install semgrep --quiet 2>/dev/null || true
            fi
          fi

          # Re-check if Semgrep is now available
          if ! command -v semgrep &> /dev/null; then
            echo "Semgrep not available — skipping security scan"
            echo ":white_check_mark: **Skipped** — Semgrep not available" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Install Semgrep to enable security scanning: \`pip install semgrep\`_" >> $GITHUB_STEP_SUMMARY
            echo "semgrep_status=skipped" >> $GITHUB_OUTPUT
            echo "semgrep_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_medium=0" >> $GITHUB_OUTPUT
            echo "semgrep_low=0" >> $GITHUB_OUTPUT
            echo "semgrep_new_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_existing_high=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          SEMGREP_VERSION=$(semgrep --version 2>/dev/null || echo "unknown")
          echo "Semgrep version: $SEMGREP_VERSION"
          echo "**Semgrep version:** \`$SEMGREP_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get changed files in PR (code files only)
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD | grep -E '\.(js|jsx|ts|tsx|py|java|go|rb|php|c|cpp|cs|rs|swift|kt|scala)$' || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No scannable files changed in PR — skipping Semgrep"
            echo ":white_check_mark: **Skipped** — No scannable files changed in PR" >> $GITHUB_STEP_SUMMARY
            echo "semgrep_status=skipped" >> $GITHUB_OUTPUT
            echo "semgrep_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_medium=0" >> $GITHUB_OUTPUT
            echo "semgrep_low=0" >> $GITHUB_OUTPUT
            echo "semgrep_new_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_existing_high=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count changed files
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | xargs)
          echo "Scanning $FILE_COUNT changed file(s)..."
          echo "**Files scanned:** $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build --include patterns for changed files only
          INCLUDE_ARGS=""
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              INCLUDE_ARGS="$INCLUDE_ARGS --include $file"
            fi
          done

          if [ -z "$(echo "$INCLUDE_ARGS" | xargs)" ]; then
            echo "All changed files were deleted — skipping Semgrep"
            echo ":white_check_mark: **Skipped** — All changed files were deleted" >> $GITHUB_STEP_SUMMARY
            echo "semgrep_status=skipped" >> $GITHUB_OUTPUT
            echo "semgrep_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_medium=0" >> $GITHUB_OUTPUT
            echo "semgrep_low=0" >> $GITHUB_OUTPUT
            echo "semgrep_new_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_existing_high=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine rulesets to use
          RULESETS="${HAWKY_GATE_SEMGREP_RULESETS:-p/security-audit}"
          echo "**Rulesets:** \`$RULESETS\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build ruleset args
          RULESET_ARGS=""
          for ruleset in $RULESETS; do
            RULESET_ARGS="$RULESET_ARGS --config $ruleset"
          done

          # Run Semgrep with JSON output
          SEMGREP_START=$(date +%s)
          set +e
          SEMGREP_OUTPUT=$(semgrep scan $RULESET_ARGS --json $INCLUDE_ARGS . 2>&1)
          SEMGREP_EXIT_CODE=$?
          set -e
          SEMGREP_END=$(date +%s)
          SEMGREP_TIME=$((SEMGREP_END - SEMGREP_START))

          echo "**Scan time:** ${SEMGREP_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output scan time for summary
          echo "semgrep_time=${SEMGREP_TIME}s" >> $GITHUB_OUTPUT

          # Parse JSON output with S081 baseline comparison
          # Semgrep JSON format: { results: [{ check_id, path, start: {line, col}, extra: {severity, message} }], errors: [] }
          HIGH_COUNT=0
          MEDIUM_COUNT=0
          LOW_COUNT=0
          INFO_COUNT=0
          NEW_HIGH=0
          EXISTING_HIGH=0

          # Check if output is valid JSON
          if echo "$SEMGREP_OUTPUT" | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))" 2>/dev/null; then
            # S081: Parse with baseline check using Node.js
            PARSED=$(echo "$SEMGREP_OUTPUT" | node -e "
              const crypto = require('crypto');
              const fs = require('fs');

              // Load baseline hashes
              const baselineHashes = new Set(JSON.parse(fs.readFileSync('/tmp/baseline_hashes.json', 'utf8')));

              // Compute hash for violation
              function computeHash(ruleId, filePath, lineNum) {
                try {
                  if (!fs.existsSync(filePath)) {
                    return crypto.createHash('sha256').update('no-file:semgrep:' + ruleId + ':' + filePath + ':' + lineNum).digest('hex');
                  }
                  const content = fs.readFileSync(filePath, 'utf8').split('\n');
                  const startLine = Math.max(0, lineNum - 3);
                  const endLine = Math.min(content.length, lineNum + 2);
                  const context = content.slice(startLine, endLine)
                    .map(line => line.trim().replace(/\s+/g, ' '))
                    .join(' ')
                    .trim();
                  return crypto.createHash('sha256').update('semgrep:' + ruleId + ':' + context).digest('hex');
                } catch (e) {
                  return crypto.createHash('sha256').update('error:semgrep:' + ruleId + ':' + filePath + ':' + lineNum).digest('hex');
                }
              }

              const data = JSON.parse(fs.readFileSync(0, 'utf8'));
              let high = 0, medium = 0, low = 0, info = 0;
              let newHigh = 0, existingHigh = 0;
              const newAnnotations = [];
              const existingAnnotations = [];

              (data.results || []).forEach(result => {
                const severity = (result.extra?.severity || 'INFO').toUpperCase();
                const file = result.path;
                const line = result.start?.line || 1;
                const col = result.start?.col || 1;
                const ruleId = result.check_id || 'unknown';
                const message = (result.extra?.message || 'Security finding').replace(/'/g, \"'\").replace(/\n/g, ' ');

                // Count by severity
                if (severity === 'ERROR' || severity === 'HIGH') high++;
                else if (severity === 'WARNING' || severity === 'MEDIUM') medium++;
                else if (severity === 'LOW') low++;
                else info++;

                // Map severity to annotation type
                const annotationType = (severity === 'ERROR' || severity === 'HIGH') ? 'error' : 'warning';
                const annotation = { severity: annotationType, file, line, col, ruleId, message, originalSeverity: severity };

                // Check baseline for high-severity findings
                if (severity === 'ERROR' || severity === 'HIGH') {
                  const hash = computeHash(ruleId, file, line);
                  if (baselineHashes.has(hash)) {
                    existingHigh++;
                    existingAnnotations.push(annotation);
                  } else {
                    newHigh++;
                    newAnnotations.push(annotation);
                  }
                } else {
                  // Non-high-severity findings are informational
                  newAnnotations.push(annotation);
                }
              });

              console.log(JSON.stringify({ high, medium, low, info, newHigh, existingHigh, newAnnotations, existingAnnotations }));
            ")

            HIGH_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).high)")
            MEDIUM_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).medium)")
            LOW_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).low)")
            INFO_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).info)")
            NEW_HIGH=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).newHigh)")
            EXISTING_HIGH=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).existingHigh)")

            # Emit GitHub annotations only for NEW high-severity findings
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.newAnnotations.forEach(a => {
                console.log('::' + a.severity + ' file=' + a.file + ',line=' + a.line + ',col=' + a.col + ',title=Semgrep [' + a.originalSeverity + '] ' + a.ruleId + '::' + a.message);
              });
            "
          else
            # JSON parsing failed - check for Semgrep errors
            echo "Semgrep output was not valid JSON — check for errors"
            echo "::error::Semgrep failed to produce valid output. Check configuration."
            echo ":x: **Failed** — Semgrep error" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Output" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$SEMGREP_OUTPUT" | tail -50 >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "semgrep_status=failed" >> $GITHUB_OUTPUT
            echo "semgrep_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_medium=0" >> $GITHUB_OUTPUT
            echo "semgrep_low=0" >> $GITHUB_OUTPUT
            echo "semgrep_new_high=0" >> $GITHUB_OUTPUT
            echo "semgrep_existing_high=0" >> $GITHUB_OUTPUT
            exit 1
          fi

          TOTAL_FINDINGS=$((HIGH_COUNT + MEDIUM_COUNT + LOW_COUNT + INFO_COUNT))

          # Summary table with baseline info
          echo "### Security Findings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | New | Existing | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| :red_circle: High/Error | $NEW_HIGH | $EXISTING_HIGH | $HIGH_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| :orange_circle: Medium/Warning | - | - | $MEDIUM_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| :yellow_circle: Low | - | - | $LOW_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| :white_circle: Info | - | - | $INFO_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Store counts for future gates
          echo "semgrep_high=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "semgrep_medium=$MEDIUM_COUNT" >> $GITHUB_OUTPUT
          echo "semgrep_low=$LOW_COUNT" >> $GITHUB_OUTPUT
          echo "semgrep_info=$INFO_COUNT" >> $GITHUB_OUTPUT
          echo "semgrep_new_high=$NEW_HIGH" >> $GITHUB_OUTPUT
          echo "semgrep_existing_high=$EXISTING_HIGH" >> $GITHUB_OUTPUT

          # Handle results - only NEW high severity findings block merge
          if [ "$NEW_HIGH" -gt 0 ]; then
            echo ":x: **Failed** — $NEW_HIGH NEW high-severity finding(s)" >> $GITHUB_STEP_SUMMARY
            if [ "$EXISTING_HIGH" -gt 0 ]; then
              echo ":white_circle: **Existing** — $EXISTING_HIGH high-severity finding(s) in baseline" >> $GITHUB_STEP_SUMMARY
            fi
            echo "semgrep_status=failed" >> $GITHUB_OUTPUT

            # Show NEW high-severity findings
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### New High-Severity Findings (blocking)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.newAnnotations.filter(a => a.originalSeverity === 'HIGH' || a.originalSeverity === 'ERROR').forEach(a => {
                console.log('**' + a.file + ':' + a.line + '** — ' + a.ruleId);
                console.log('  ' + a.message.substring(0, 200));
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY

            # Show existing high-severity findings in collapsible
            if [ "$EXISTING_HIGH" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Existing High-Severity Findings (in baseline, not blocking)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "$PARSED" | node -e "
                const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                data.existingAnnotations.forEach(a => {
                  console.log('**' + a.file + ':' + a.line + '** — ' + a.ruleId);
                  console.log('  ' + a.message.substring(0, 200));
                  console.log('');
                });
              " >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi

            echo ""
            echo "Semgrep failed: $NEW_HIGH NEW high-severity finding(s), $EXISTING_HIGH existing"
            exit 1
          fi

          # Only existing high-severity findings - pass (baseline mode)
          if [ "$EXISTING_HIGH" -gt 0 ]; then
            echo ":white_check_mark: **Passed** — No NEW high-severity findings" >> $GITHUB_STEP_SUMMARY
            echo ":white_circle: **Existing** — $EXISTING_HIGH high-severity finding(s) in baseline (not blocking)" >> $GITHUB_STEP_SUMMARY
            echo "semgrep_status=passed" >> $GITHUB_OUTPUT

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Existing High-Severity Findings (in baseline)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.existingAnnotations.forEach(a => {
                console.log('**' + a.file + ':' + a.line + '** — ' + a.ruleId);
                console.log('  ' + a.message.substring(0, 200));
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Run \`hawky baseline --update\` to refresh the baseline after fixing issues._" >> $GITHUB_STEP_SUMMARY

            echo "Semgrep passed — $EXISTING_HIGH existing high-severity finding(s) in baseline"
          elif [ "$MEDIUM_COUNT" -gt 0 ]; then
            echo ":white_check_mark: **Passed** — $MEDIUM_COUNT medium-severity finding(s) (warnings)" >> $GITHUB_STEP_SUMMARY
            echo "::warning::Semgrep found $MEDIUM_COUNT medium-severity finding(s)"
            echo "semgrep_status=passed" >> $GITHUB_OUTPUT

            # Show warnings in collapsible section
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Medium-Severity Findings ($MEDIUM_COUNT)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.newAnnotations.filter(a => a.originalSeverity === 'MEDIUM' || a.originalSeverity === 'WARNING').forEach(a => {
                console.log('**' + a.file + ':' + a.line + '** — ' + a.ruleId);
                console.log('  ' + a.message.substring(0, 200));
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY

            echo "Semgrep passed with $MEDIUM_COUNT medium-severity warning(s)"
          elif [ "$LOW_COUNT" -gt 0 ] || [ "$INFO_COUNT" -gt 0 ]; then
            echo ":white_check_mark: **Passed** — $LOW_COUNT low + $INFO_COUNT info finding(s)" >> $GITHUB_STEP_SUMMARY
            echo "semgrep_status=passed" >> $GITHUB_OUTPUT

            # Show low/info in collapsible section
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Low/Info Findings ($((LOW_COUNT + INFO_COUNT)))</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.newAnnotations.filter(a => a.originalSeverity === 'LOW' || a.originalSeverity === 'INFO').forEach(a => {
                console.log('**' + a.file + ':' + a.line + '** — ' + a.ruleId);
                console.log('  ' + a.message.substring(0, 200));
                console.log('');
              });
            " >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY

            echo "Semgrep passed with $LOW_COUNT low + $INFO_COUNT info finding(s)"
          else
            echo ":white_check_mark: **Passed** — No security findings" >> $GITHUB_STEP_SUMMARY
            echo "Semgrep passed — no findings"
            echo "semgrep_status=passed" >> $GITHUB_OUTPUT
          fi

      # S015: Gitleaks Secret Scanning Gate
      # Scans for hardcoded secrets in changed files
      # Respects HAWKY_GATE_GITLEAKS_ENABLED and blocking configs
      # S081: Note - Secrets are generally NOT included in baseline (security risk)
      - name: Gitleaks Secret Scanning Gate
        id: gitleaks
        if: ${{ env.HAWKY_GATE_GITLEAKS_ENABLED != 'false' && ((steps.typecheck.outputs.tsc_status != 'failed' || env.HAWKY_GATE_TYPESCRIPT_BLOCKING != 'true') && (steps.build.outputs.build_status != 'failed' || env.HAWKY_GATE_BUILD_BLOCKING != 'true') && (steps.test.outputs.test_status != 'failed' || env.HAWKY_GATE_TEST_BLOCKING != 'true') && (steps.eslint.outputs.eslint_status != 'failed' || env.HAWKY_GATE_ESLINT_BLOCKING != 'true') && (steps.semgrep.outputs.semgrep_status != 'failed' || env.HAWKY_GATE_SEMGREP_BLOCKING != 'true') || env.HAWKY_FAIL_FAST != 'true') }}
        run: |
          echo "## Gitleaks Secret Scanning Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if Gitleaks is available
          if ! command -v gitleaks &> /dev/null; then
            # Try to install via binary download
            echo "Gitleaks not found, attempting to install..."
            GITLEAKS_VERSION="8.18.4"
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz 2>/dev/null || true
            if [ -f /tmp/gitleaks.tar.gz ]; then
              tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks 2>/dev/null || true
              if [ -f /tmp/gitleaks ]; then
                chmod +x /tmp/gitleaks
                sudo mv /tmp/gitleaks /usr/local/bin/gitleaks 2>/dev/null || mv /tmp/gitleaks $HOME/.local/bin/gitleaks 2>/dev/null || true
              fi
            fi
          fi

          # Re-check if Gitleaks is now available
          if ! command -v gitleaks &> /dev/null; then
            echo "Gitleaks not available — skipping secret scan"
            echo ":white_check_mark: **Skipped** — Gitleaks not available" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Install Gitleaks to enable secret scanning: https://github.com/gitleaks/gitleaks_" >> $GITHUB_STEP_SUMMARY
            echo "gitleaks_status=skipped" >> $GITHUB_OUTPUT
            echo "gitleaks_secrets=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          GITLEAKS_VERSION=$(gitleaks version 2>/dev/null || echo "unknown")
          echo "Gitleaks version: $GITLEAKS_VERSION"
          echo "**Gitleaks version:** \`$GITLEAKS_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get changed files in PR
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No files changed in PR — skipping Gitleaks"
            echo ":white_check_mark: **Skipped** — No files changed in PR" >> $GITHUB_STEP_SUMMARY
            echo "gitleaks_status=skipped" >> $GITHUB_OUTPUT
            echo "gitleaks_secrets=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count changed files
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | xargs)
          echo "Scanning $FILE_COUNT changed file(s) for secrets..."
          echo "**Files scanned:** $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Write changed files to a temp file for --log-opts
          echo "$CHANGED_FILES" > /tmp/changed_files.txt

          # Run Gitleaks with JSON output on changed files only
          # Use detect mode with --no-git to scan files directly
          GITLEAKS_START=$(date +%s)
          set +e

          # Create a temporary directory with only changed files
          SCAN_DIR=$(mktemp -d)
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              # Create directory structure and copy file
              mkdir -p "$SCAN_DIR/$(dirname "$file")"
              cp "$file" "$SCAN_DIR/$file"
            fi
          done

          # Check for .gitleaksignore in repo root
          IGNORE_ARGS=""
          if [ -f ".gitleaksignore" ]; then
            echo "**Using:** \`.gitleaksignore\` for suppressions" >> $GITHUB_STEP_SUMMARY
            cp .gitleaksignore "$SCAN_DIR/.gitleaksignore"
          fi

          # Run gitleaks on the staged files
          GITLEAKS_OUTPUT=$(gitleaks detect --source "$SCAN_DIR" --report-format json --report-path /tmp/gitleaks-report.json --no-git 2>&1)
          GITLEAKS_EXIT_CODE=$?
          set -e
          GITLEAKS_END=$(date +%s)
          GITLEAKS_TIME=$((GITLEAKS_END - GITLEAKS_START))

          # Cleanup temp directory
          rm -rf "$SCAN_DIR"

          echo "**Scan time:** ${GITLEAKS_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output scan time for summary
          echo "gitleaks_time=${GITLEAKS_TIME}s" >> $GITHUB_OUTPUT

          # Parse JSON output
          SECRET_COUNT=0

          # Check if report file exists and is valid JSON
          if [ -f /tmp/gitleaks-report.json ]; then
            if node -e "JSON.parse(require('fs').readFileSync('/tmp/gitleaks-report.json', 'utf8'))" 2>/dev/null; then
              # Parse with Node.js for reliable JSON handling
              PARSED=$(node -e "
                const data = JSON.parse(require('fs').readFileSync('/tmp/gitleaks-report.json', 'utf8'));
                const findings = Array.isArray(data) ? data : [];
                const annotations = [];

                // Filter out test fixtures, mocks, and examples
                const filteredFindings = findings.filter(f => {
                  const file = f.File || '';
                  // Skip test directories, mock files, and example files
                  if (/[\\\/](test|tests|__tests__|__mocks__|mocks|fixtures|examples?|samples?)[\\\/]/i.test(file)) return false;
                  if (/\.(test|spec|mock|example|sample)\.[^.]+\$/i.test(file)) return false;
                  if (/[\\\/](test|spec|mock|example|sample)[_-]/i.test(file)) return false;
                  return true;
                });

                filteredFindings.forEach(finding => {
                  const file = finding.File || 'unknown';
                  const line = finding.StartLine || 1;
                  const rule = finding.RuleID || 'secret-detected';
                  const description = finding.Description || 'Potential secret detected';
                  const secret = finding.Secret ? finding.Secret.substring(0, 20) + '...' : 'redacted';

                  annotations.push({
                    file,
                    line,
                    rule,
                    description,
                    match: finding.Match || ''
                  });
                });

                console.log(JSON.stringify({ count: filteredFindings.length, annotations }));
              ")

              SECRET_COUNT=$(echo "$PARSED" | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf8')).count)")

              # Emit GitHub annotations
              echo "$PARSED" | node -e "
                const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                data.annotations.forEach(a => {
                  console.log('::error file=' + a.file + ',line=' + a.line + ',title=Gitleaks ' + a.rule + '::' + a.description);
                });
              "
            else
              # JSON parsing failed but might just be empty array
              echo "Gitleaks report was not valid JSON — treating as no findings"
            fi
          fi

          # If gitleaks exit code indicates findings (exit 1) but we filtered them all, reset
          if [ "$GITLEAKS_EXIT_CODE" -eq 1 ] && [ "$SECRET_COUNT" -eq 0 ]; then
            echo "All findings were in test fixtures — treating as passed"
            GITLEAKS_EXIT_CODE=0
          fi

          # Store count for future gates
          echo "gitleaks_secrets=$SECRET_COUNT" >> $GITHUB_OUTPUT

          # Handle results - any secrets block merge
          if [ "$SECRET_COUNT" -gt 0 ]; then
            echo "### :rotating_light: Secrets Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Line | Rule | Description |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|------|-------------|" >> $GITHUB_STEP_SUMMARY

            echo "$PARSED" | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              data.annotations.forEach(a => {
                console.log('| \`' + a.file + '\` | ' + a.line + ' | \`' + a.rule + '\` | ' + a.description.substring(0, 50) + ' |');
              });
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":x: **Failed** — $SECRET_COUNT secret(s) detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_To suppress false positives, add entries to \`.gitleaksignore\`._" >> $GITHUB_STEP_SUMMARY
            echo "gitleaks_status=failed" >> $GITHUB_OUTPUT

            echo ""
            echo "Gitleaks failed: $SECRET_COUNT secret(s) detected"
            exit 1
          fi

          echo ":white_check_mark: **Passed** — No secrets detected" >> $GITHUB_STEP_SUMMARY
          echo "Gitleaks passed — no secrets detected"
          echo "gitleaks_status=passed" >> $GITHUB_OUTPUT

      # S006: Gate Report Summary
      # Posts/updates a PR comment with aggregated gate results
      # S007: Now includes fail-fast skip detection
      # S008: Now includes disabled gate detection from .hawky.yml config
      # S081: Now includes baseline comparison (new vs existing violations)
      - name: Gate Report Summary
        id: report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          FAIL_FAST_ENABLED: ${{ env.HAWKY_FAIL_FAST }}
          # S081: Baseline info
          BASELINE_FOUND: ${{ steps.baseline.outputs.baseline_found || 'false' }}
          BASELINE_COUNT: ${{ steps.baseline.outputs.baseline_count || '0' }}
          # S008: Gate enabled/blocking config
          TSC_ENABLED: ${{ env.HAWKY_GATE_TYPESCRIPT_ENABLED }}
          TSC_BLOCKING: ${{ env.HAWKY_GATE_TYPESCRIPT_BLOCKING }}
          BUILD_ENABLED: ${{ env.HAWKY_GATE_BUILD_ENABLED }}
          BUILD_BLOCKING: ${{ env.HAWKY_GATE_BUILD_BLOCKING }}
          TEST_ENABLED: ${{ env.HAWKY_GATE_TEST_ENABLED }}
          TEST_BLOCKING: ${{ env.HAWKY_GATE_TEST_BLOCKING }}
          ESLINT_ENABLED: ${{ env.HAWKY_GATE_ESLINT_ENABLED }}
          ESLINT_BLOCKING: ${{ env.HAWKY_GATE_ESLINT_BLOCKING }}
          # S009: Semgrep config
          SEMGREP_ENABLED: ${{ env.HAWKY_GATE_SEMGREP_ENABLED }}
          SEMGREP_BLOCKING: ${{ env.HAWKY_GATE_SEMGREP_BLOCKING }}
          # Gate outputs
          TSC_STATUS: ${{ steps.typecheck.outputs.tsc_status || 'unknown' }}
          TSC_ERRORS: ${{ steps.typecheck.outputs.tsc_errors || '0' }}
          TSC_NEW_ERRORS: ${{ steps.typecheck.outputs.tsc_new_errors || '0' }}
          TSC_EXISTING_ERRORS: ${{ steps.typecheck.outputs.tsc_existing_errors || '0' }}
          TSC_TIME: ${{ steps.typecheck.outputs.tsc_time || 'N/A' }}
          BUILD_STATUS: ${{ steps.build.outputs.build_status || 'unknown' }}
          BUILD_WARNINGS: ${{ steps.build.outputs.build_warnings || '0' }}
          BUILD_TIME: ${{ steps.build.outputs.build_time || 'N/A' }}
          BUILD_STEP_RAN: ${{ steps.build.outcome != 'skipped' }}
          TEST_STATUS: ${{ steps.test.outputs.test_status || 'unknown' }}
          TEST_TOTAL: ${{ steps.test.outputs.test_total || '0' }}
          TEST_PASSED: ${{ steps.test.outputs.test_passed || '0' }}
          TEST_FAILED: ${{ steps.test.outputs.test_failed || '0' }}
          TEST_SKIPPED: ${{ steps.test.outputs.test_skipped || '0' }}
          TEST_TIME: ${{ steps.test.outputs.test_time || 'N/A' }}
          TEST_STEP_RAN: ${{ steps.test.outcome != 'skipped' }}
          ESLINT_STATUS: ${{ steps.eslint.outputs.eslint_status || 'unknown' }}
          ESLINT_ERRORS: ${{ steps.eslint.outputs.eslint_errors || '0' }}
          ESLINT_NEW_ERRORS: ${{ steps.eslint.outputs.eslint_new_errors || '0' }}
          ESLINT_EXISTING_ERRORS: ${{ steps.eslint.outputs.eslint_existing_errors || '0' }}
          ESLINT_WARNINGS: ${{ steps.eslint.outputs.eslint_warnings || '0' }}
          ESLINT_TIME: ${{ steps.eslint.outputs.eslint_time || 'N/A' }}
          ESLINT_STEP_RAN: ${{ steps.eslint.outcome != 'skipped' }}
          # S009: Semgrep outputs
          SEMGREP_STATUS: ${{ steps.semgrep.outputs.semgrep_status || 'unknown' }}
          SEMGREP_HIGH: ${{ steps.semgrep.outputs.semgrep_high || '0' }}
          SEMGREP_NEW_HIGH: ${{ steps.semgrep.outputs.semgrep_new_high || '0' }}
          SEMGREP_EXISTING_HIGH: ${{ steps.semgrep.outputs.semgrep_existing_high || '0' }}
          SEMGREP_MEDIUM: ${{ steps.semgrep.outputs.semgrep_medium || '0' }}
          SEMGREP_LOW: ${{ steps.semgrep.outputs.semgrep_low || '0' }}
          SEMGREP_TIME: ${{ steps.semgrep.outputs.semgrep_time || 'N/A' }}
          SEMGREP_STEP_RAN: ${{ steps.semgrep.outcome != 'skipped' }}
          # S015: Gitleaks outputs
          GITLEAKS_ENABLED: ${{ env.HAWKY_GATE_GITLEAKS_ENABLED }}
          GITLEAKS_BLOCKING: ${{ env.HAWKY_GATE_GITLEAKS_BLOCKING }}
          GITLEAKS_STATUS: ${{ steps.gitleaks.outputs.gitleaks_status || 'unknown' }}
          GITLEAKS_SECRETS: ${{ steps.gitleaks.outputs.gitleaks_secrets || '0' }}
          GITLEAKS_TIME: ${{ steps.gitleaks.outputs.gitleaks_time || 'N/A' }}
          GITLEAKS_STEP_RAN: ${{ steps.gitleaks.outcome != 'skipped' }}
        run: |
          # Determine overall status
          OVERALL_STATUS="passed"
          FAILED_GATES=""
          FAIL_FAST_SKIPPED=""
          DISABLED_GATES=""

          # S008: Check for disabled gates first
          if [ "$TSC_ENABLED" = "false" ]; then
            TSC_STATUS="disabled"
            DISABLED_GATES="$DISABLED_GATES TypeScript"
          elif [ "$TSC_STATUS" = "failed" ]; then
            # Only count as blocking failure if gate is configured as blocking
            if [ "$TSC_BLOCKING" != "false" ]; then
              OVERALL_STATUS="failed"
              FAILED_GATES="$FAILED_GATES TypeScript"
            fi
          fi

          # Build gate: check disabled, then fail-fast, then failure
          if [ "$BUILD_ENABLED" = "false" ]; then
            BUILD_STATUS="disabled"
            DISABLED_GATES="$DISABLED_GATES Build"
          elif [ "$BUILD_STEP_RAN" = "false" ] && [ "$FAIL_FAST_ENABLED" = "true" ] && [ "$TSC_STATUS" = "failed" ] && [ "$TSC_BLOCKING" != "false" ]; then
            BUILD_STATUS="fail-fast"
            FAIL_FAST_SKIPPED="$FAIL_FAST_SKIPPED Build"
          elif [ "$BUILD_STATUS" = "failed" ]; then
            if [ "$BUILD_BLOCKING" != "false" ]; then
              OVERALL_STATUS="failed"
              FAILED_GATES="$FAILED_GATES Build"
            fi
          fi

          # Test gate: check disabled, then fail-fast, then failure
          if [ "$TEST_ENABLED" = "false" ]; then
            TEST_STATUS="disabled"
            DISABLED_GATES="$DISABLED_GATES Test"
          elif [ "$TEST_STEP_RAN" = "false" ] && [ "$FAIL_FAST_ENABLED" = "true" ] && ([ "$TSC_STATUS" = "failed" ] && [ "$TSC_BLOCKING" != "false" ] || [ "$BUILD_STATUS" = "failed" ] && [ "$BUILD_BLOCKING" != "false" ]); then
            TEST_STATUS="fail-fast"
            FAIL_FAST_SKIPPED="$FAIL_FAST_SKIPPED Test"
          elif [ "$TEST_STATUS" = "failed" ]; then
            if [ "$TEST_BLOCKING" != "false" ]; then
              OVERALL_STATUS="failed"
              FAILED_GATES="$FAILED_GATES Test"
            fi
          fi

          # ESLint gate: check disabled, then fail-fast, then failure
          if [ "$ESLINT_ENABLED" = "false" ]; then
            ESLINT_STATUS="disabled"
            DISABLED_GATES="$DISABLED_GATES ESLint"
          elif [ "$ESLINT_STEP_RAN" = "false" ] && [ "$FAIL_FAST_ENABLED" = "true" ] && ([ "$TSC_STATUS" = "failed" ] && [ "$TSC_BLOCKING" != "false" ] || [ "$BUILD_STATUS" = "failed" ] && [ "$BUILD_BLOCKING" != "false" ] || [ "$TEST_STATUS" = "failed" ] && [ "$TEST_BLOCKING" != "false" ]); then
            ESLINT_STATUS="fail-fast"
            FAIL_FAST_SKIPPED="$FAIL_FAST_SKIPPED ESLint"
          elif [ "$ESLINT_STATUS" = "failed" ]; then
            if [ "$ESLINT_BLOCKING" != "false" ]; then
              OVERALL_STATUS="failed"
              FAILED_GATES="$FAILED_GATES ESLint"
            fi
          fi

          # S009: Semgrep gate: check disabled, then fail-fast, then failure
          if [ "$SEMGREP_ENABLED" = "false" ]; then
            SEMGREP_STATUS="disabled"
            DISABLED_GATES="$DISABLED_GATES Semgrep"
          elif [ "$SEMGREP_STEP_RAN" = "false" ] && [ "$FAIL_FAST_ENABLED" = "true" ] && ([ "$TSC_STATUS" = "failed" ] && [ "$TSC_BLOCKING" != "false" ] || [ "$BUILD_STATUS" = "failed" ] && [ "$BUILD_BLOCKING" != "false" ] || [ "$TEST_STATUS" = "failed" ] && [ "$TEST_BLOCKING" != "false" ] || [ "$ESLINT_STATUS" = "failed" ] && [ "$ESLINT_BLOCKING" != "false" ]); then
            SEMGREP_STATUS="fail-fast"
            FAIL_FAST_SKIPPED="$FAIL_FAST_SKIPPED Semgrep"
          elif [ "$SEMGREP_STATUS" = "failed" ]; then
            if [ "$SEMGREP_BLOCKING" != "false" ]; then
              OVERALL_STATUS="failed"
              FAILED_GATES="$FAILED_GATES Semgrep"
            fi
          fi

          # S015: Gitleaks gate: check disabled, then fail-fast, then failure
          if [ "$GITLEAKS_ENABLED" = "false" ]; then
            GITLEAKS_STATUS="disabled"
            DISABLED_GATES="$DISABLED_GATES Gitleaks"
          elif [ "$GITLEAKS_STEP_RAN" = "false" ] && [ "$FAIL_FAST_ENABLED" = "true" ] && ([ "$TSC_STATUS" = "failed" ] && [ "$TSC_BLOCKING" != "false" ] || [ "$BUILD_STATUS" = "failed" ] && [ "$BUILD_BLOCKING" != "false" ] || [ "$TEST_STATUS" = "failed" ] && [ "$TEST_BLOCKING" != "false" ] || [ "$ESLINT_STATUS" = "failed" ] && [ "$ESLINT_BLOCKING" != "false" ] || [ "$SEMGREP_STATUS" = "failed" ] && [ "$SEMGREP_BLOCKING" != "false" ]); then
            GITLEAKS_STATUS="fail-fast"
            FAIL_FAST_SKIPPED="$FAIL_FAST_SKIPPED Gitleaks"
          elif [ "$GITLEAKS_STATUS" = "failed" ]; then
            if [ "$GITLEAKS_BLOCKING" != "false" ]; then
              OVERALL_STATUS="failed"
              FAILED_GATES="$FAILED_GATES Gitleaks"
            fi
          fi

          # Handle unknown statuses (step ran but produced no output - unusual)
          if [ "$TSC_STATUS" = "unknown" ] || [ "$BUILD_STATUS" = "unknown" ] || [ "$TEST_STATUS" = "unknown" ] || [ "$ESLINT_STATUS" = "unknown" ] || [ "$SEMGREP_STATUS" = "unknown" ] || [ "$GITLEAKS_STATUS" = "unknown" ]; then
            if [ "$OVERALL_STATUS" != "failed" ]; then
              OVERALL_STATUS="partial"
            fi
          fi

          # Status badges
          if [ "$OVERALL_STATUS" = "passed" ]; then
            BADGE=":white_check_mark: **All Gates Passed**"
          elif [ "$OVERALL_STATUS" = "failed" ]; then
            BADGE=":x: **Gates Failed:**$FAILED_GATES"
          else
            BADGE=":warning: **Partial Run** — Some gates were skipped"
          fi

          # Helper function for status icon
          status_icon() {
            case "$1" in
              passed) echo ":white_check_mark:" ;;
              failed) echo ":x:" ;;
              skipped) echo ":fast_forward:" ;;
              fail-fast) echo ":stop_sign:" ;;
              disabled) echo ":no_entry_sign:" ;;
              *) echo ":grey_question:" ;;
            esac
          }

          # Build the comment body using a heredoc for proper formatting
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Create the comment file with header
          echo "## Hawky Review Summary" > /tmp/hawky-comment.md
          echo "" >> /tmp/hawky-comment.md

          # Add badge
          echo "$BADGE" >> /tmp/hawky-comment.md
          echo "" >> /tmp/hawky-comment.md

          # S081: Show baseline info if present
          if [ "$BASELINE_FOUND" = "true" ]; then
            echo ":bookmark: **Baseline active** — $BASELINE_COUNT existing violation(s) excluded" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
          fi

          # Add table header with baseline columns
          echo "| Gate | Status | New | Existing | Time |" >> /tmp/hawky-comment.md
          echo "|------|--------|-----|----------|------|" >> /tmp/hawky-comment.md

          # S081: Show new vs existing for gates with baseline support
          TSC_DETAILS="${TSC_NEW_ERRORS} error(s)"
          if [ "$TSC_EXISTING_ERRORS" -gt 0 ]; then
            TSC_EXISTING_DISPLAY="$TSC_EXISTING_ERRORS"
          else
            TSC_EXISTING_DISPLAY="-"
          fi

          ESLINT_DETAILS="${ESLINT_NEW_ERRORS} error(s)"
          if [ "$ESLINT_EXISTING_ERRORS" -gt 0 ]; then
            ESLINT_EXISTING_DISPLAY="$ESLINT_EXISTING_ERRORS"
          else
            ESLINT_EXISTING_DISPLAY="-"
          fi

          SEMGREP_DETAILS="${SEMGREP_NEW_HIGH} high"
          if [ "$SEMGREP_EXISTING_HIGH" -gt 0 ]; then
            SEMGREP_EXISTING_DISPLAY="$SEMGREP_EXISTING_HIGH"
          else
            SEMGREP_EXISTING_DISPLAY="-"
          fi

          echo "| TypeScript | $(status_icon "$TSC_STATUS") $TSC_STATUS | $TSC_DETAILS | $TSC_EXISTING_DISPLAY | $TSC_TIME |" >> /tmp/hawky-comment.md
          echo "| Build | $(status_icon "$BUILD_STATUS") $BUILD_STATUS | ${BUILD_WARNINGS} warn | - | $BUILD_TIME |" >> /tmp/hawky-comment.md
          echo "| Test | $(status_icon "$TEST_STATUS") $TEST_STATUS | ${TEST_FAILED} failed | - | $TEST_TIME |" >> /tmp/hawky-comment.md
          echo "| ESLint | $(status_icon "$ESLINT_STATUS") $ESLINT_STATUS | $ESLINT_DETAILS | $ESLINT_EXISTING_DISPLAY | $ESLINT_TIME |" >> /tmp/hawky-comment.md
          echo "| Semgrep | $(status_icon "$SEMGREP_STATUS") $SEMGREP_STATUS | $SEMGREP_DETAILS | $SEMGREP_EXISTING_DISPLAY | $SEMGREP_TIME |" >> /tmp/hawky-comment.md
          echo "| Gitleaks | $(status_icon "$GITLEAKS_STATUS") $GITLEAKS_STATUS | ${GITLEAKS_SECRETS} secret(s) | - | $GITLEAKS_TIME |" >> /tmp/hawky-comment.md
          echo "" >> /tmp/hawky-comment.md

          # Add details sections for failures
          if [ "$OVERALL_STATUS" = "failed" ]; then
            echo "<details>" >> /tmp/hawky-comment.md
            echo "<summary>:mag: Quick Links to Failed Steps</summary>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md

            if [ "$TSC_STATUS" = "failed" ]; then
              echo "- [TypeScript Errors]($WORKFLOW_URL) — $TSC_ERRORS type error(s)" >> /tmp/hawky-comment.md
            fi

            if [ "$BUILD_STATUS" = "failed" ]; then
              echo "- [Build Errors]($WORKFLOW_URL) — Build failed" >> /tmp/hawky-comment.md
            fi

            if [ "$TEST_STATUS" = "failed" ]; then
              echo "- [Test Failures]($WORKFLOW_URL) — $TEST_FAILED test(s) failed" >> /tmp/hawky-comment.md
            fi

            if [ "$ESLINT_STATUS" = "failed" ]; then
              echo "- [ESLint Errors]($WORKFLOW_URL) — $ESLINT_ERRORS lint error(s)" >> /tmp/hawky-comment.md
            fi

            if [ "$SEMGREP_STATUS" = "failed" ]; then
              echo "- [Semgrep Findings]($WORKFLOW_URL) — $SEMGREP_HIGH high-severity finding(s)" >> /tmp/hawky-comment.md
            fi

            if [ "$GITLEAKS_STATUS" = "failed" ]; then
              echo "- [Gitleaks Findings]($WORKFLOW_URL) — $GITLEAKS_SECRETS secret(s) detected" >> /tmp/hawky-comment.md
            fi

            echo "" >> /tmp/hawky-comment.md
            echo "</details>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
          fi

          # Add fail-fast skipped gates info if any
          if [ -n "$FAIL_FAST_SKIPPED" ]; then
            echo "<details>" >> /tmp/hawky-comment.md
            echo "<summary>:stop_sign: Fail-Fast Skipped Gates</summary>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "The following gates were skipped due to a prior blocking failure:$FAIL_FAST_SKIPPED" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "_Fail-fast mode is enabled. Set \`HAWKY_FAIL_FAST: 'false'\` in workflow env to run all gates._" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "</details>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
          fi

          # S008: Add disabled gates info if any
          if [ -n "$DISABLED_GATES" ]; then
            echo "<details>" >> /tmp/hawky-comment.md
            echo "<summary>:no_entry_sign: Disabled Gates</summary>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "The following gates are disabled in \`.hawky.yml\`:$DISABLED_GATES" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "_To enable a gate, set \`enabled: true\` in the gate configuration._" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "</details>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
          fi

          # Add skipped gates info if any (no config found)
          SKIPPED_GATES=""
          [ "$TSC_STATUS" = "skipped" ] && SKIPPED_GATES="$SKIPPED_GATES TypeScript,"
          [ "$BUILD_STATUS" = "skipped" ] && SKIPPED_GATES="$SKIPPED_GATES Build,"
          [ "$TEST_STATUS" = "skipped" ] && SKIPPED_GATES="$SKIPPED_GATES Test,"
          [ "$ESLINT_STATUS" = "skipped" ] && SKIPPED_GATES="$SKIPPED_GATES ESLint,"
          [ "$SEMGREP_STATUS" = "skipped" ] && SKIPPED_GATES="$SKIPPED_GATES Semgrep,"
          [ "$GITLEAKS_STATUS" = "skipped" ] && SKIPPED_GATES="$SKIPPED_GATES Gitleaks,"

          if [ -n "$SKIPPED_GATES" ]; then
            # Remove trailing comma
            SKIPPED_GATES=$(echo "$SKIPPED_GATES" | sed 's/,$//')
            echo "<details>" >> /tmp/hawky-comment.md
            echo "<summary>:fast_forward: Skipped Gates</summary>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "The following gates were skipped (no configuration found):$SKIPPED_GATES" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
            echo "</details>" >> /tmp/hawky-comment.md
            echo "" >> /tmp/hawky-comment.md
          fi

          # Add footer
          echo "---" >> /tmp/hawky-comment.md
          echo "_Hawky Review | [Workflow Run]($WORKFLOW_URL) | Commit: \`${{ github.sha }}\`_" >> /tmp/hawky-comment.md

          # Find existing Hawky comment or create new one
          # Look for comments containing "## Hawky Review Summary"
          EXISTING_COMMENT_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("## Hawky Review Summary")) | .id' | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            # Update existing comment
            echo "Updating existing comment: $EXISTING_COMMENT_ID"
            gh api \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments/$EXISTING_COMMENT_ID" \
              -f body="$(cat /tmp/hawky-comment.md)"
          else
            # Create new comment
            echo "Creating new comment"
            gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/hawky-comment.md
          fi

          echo "Gate Report Summary posted to PR #${{ github.event.pull_request.number }}"

          # Set output for other steps
          echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
