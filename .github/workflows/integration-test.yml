# Integration tests for Hawky action
#
# Tests the action's ability to detect violations using fixture files.
# Runs unit tests and verifies gate behavior.

name: Integration Tests

on:
  push:
    branches:
      - 'be-*'
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # Run unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

  # Test action build
  build-action:
    name: Build Action
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found after build"
            exit 1
          fi
          echo "Build output verified: dist/index.js exists"

  # Test TypeScript gate detection
  test-typescript-gate:
    name: TypeScript Gate Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-action

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Create test config (non-blocking to allow test to complete)
        run: |
          cat > .hawky.yml << 'EOF'
          fail_fast: false
          gates:
            typescript:
              enabled: true
              blocking: false
            eslint:
              enabled: false
            semgrep:
              enabled: false
            gitleaks:
              enabled: false
            build:
              enabled: false
            test:
              enabled: false
          EOF

      - name: Run Hawky on fixtures (expect violations)
        id: hawky
        uses: ./
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify TypeScript errors were detected
        run: |
          echo "Hawky completed (may have found violations - that's expected)"
          echo "TypeScript gate should detect errors in __tests__/fixtures/typescript-errors/"

  # Test ESLint gate detection
  test-eslint-gate:
    name: ESLint Gate Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-action

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ESLint
        run: npm install --save-dev eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: Build action
        run: npm run build

      - name: Create ESLint config
        run: |
          cat > eslint.config.js << 'EOF'
          module.exports = [
            {
              files: ['**/*.ts'],
              languageOptions: {
                parser: require('@typescript-eslint/parser'),
              },
              plugins: {
                '@typescript-eslint': require('@typescript-eslint/eslint-plugin'),
              },
              rules: {
                'no-unused-vars': 'warn',
                'prefer-const': 'warn',
                'no-var': 'warn',
              },
            },
          ];
          EOF

      - name: Create test config (non-blocking)
        run: |
          cat > .hawky.yml << 'EOF'
          fail_fast: false
          gates:
            typescript:
              enabled: false
            eslint:
              enabled: true
              blocking: false
            semgrep:
              enabled: false
            gitleaks:
              enabled: false
            build:
              enabled: false
            test:
              enabled: false
          EOF

      - name: Run Hawky on fixtures (expect violations)
        id: hawky
        uses: ./
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ESLint was run
        run: |
          echo "Hawky completed (may have found violations - that's expected)"
          echo "ESLint gate should detect issues in __tests__/fixtures/eslint-violations/"

  # Test baseline generation mode
  test-baseline-mode:
    name: Baseline Generation Mode
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build-action

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Create test config
        run: |
          cat > .hawky.yml << 'EOF'
          fail_fast: false
          gates:
            typescript:
              enabled: true
              blocking: false
            eslint:
              enabled: false
            semgrep:
              enabled: false
            gitleaks:
              enabled: false
            build:
              enabled: false
            test:
              enabled: false
          EOF

      - name: Run Hawky in baseline mode
        uses: ./
        with:
          mode: 'baseline'
          commit_baseline: 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify baseline was generated
        run: |
          if [ -f .hawky/baseline.json ]; then
            echo "SUCCESS: baseline.json was generated"
            cat .hawky/baseline.json | head -50
          else
            echo "NOTE: baseline.json not found (may be expected if no violations)"
          fi

          if [ -f .hawky/onboarding-report.md ]; then
            echo "SUCCESS: onboarding-report.md was generated"
            cat .hawky/onboarding-report.md | head -30
          else
            echo "NOTE: onboarding-report.md not found (may be expected)"
          fi

  # Summary job
  integration-summary:
    name: Integration Summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - build-action
      - test-typescript-gate
      - test-eslint-gate
      - test-baseline-mode
    if: always()

    steps:
      - name: Check results
        run: |
          echo "=== Integration Test Results ==="
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build Action: ${{ needs.build-action.result }}"
          echo "TypeScript Gate: ${{ needs.test-typescript-gate.result }}"
          echo "ESLint Gate: ${{ needs.test-eslint-gate.result }}"
          echo "Baseline Mode: ${{ needs.test-baseline-mode.result }}"
          echo "================================"

          # Fail if any required job failed
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "ERROR: Unit tests failed"
            exit 1
          fi

          if [ "${{ needs.build-action.result }}" != "success" ]; then
            echo "ERROR: Build failed"
            exit 1
          fi

          echo "All required jobs passed!"
