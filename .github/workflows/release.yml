# Release workflow for Hawky
#
# Triggers on version tags (v*), builds, tests, creates a GitHub Release,
# and updates the major version tag (e.g., v1 -> v1.2.3).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Validate and test before release
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build action
        run: npm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found after build"
            exit 1
          fi
          echo "Build output verified: dist/index.js exists"

  # Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Extract major version (v1.2.3 -> v1)
          MAJOR=$(echo $TAG | grep -oE '^v[0-9]+')
          echo "major=$MAJOR" >> $GITHUB_OUTPUT

          # Check if this is a prerelease (contains -, e.g., v1.0.0-beta.1)
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major version tag
        if: steps.version.outputs.prerelease == 'false'
        run: |
          MAJOR=${{ steps.version.outputs.major }}
          TAG=${{ steps.version.outputs.tag }}

          echo "Updating $MAJOR to point to $TAG"

          # Delete the major tag locally if it exists
          git tag -d $MAJOR 2>/dev/null || true

          # Create new major tag pointing to current commit
          git tag $MAJOR

          # Force push the major tag
          git push origin $MAJOR --force

          echo "Successfully updated $MAJOR -> $TAG"
