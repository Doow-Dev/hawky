# Hawky - AI-Powered Code Quality Gates
# https://github.com/the-crux-squad/hawky
#
# A GitHub Action that runs quality gates on pull requests:
# - TypeScript type checking
# - ESLint linting
# - Semgrep security scanning
# - Gitleaks secret detection
# - NPM audit dependency scanning
# - Design system compliance
# - Visual regression testing
# - LLM-powered code review
# - Multi-stack detection & validation
#
# Usage:
#   - uses: the-crux-squad/hawky@v1
#     with:
#       fail_fast: true
#       gates: 'typescript,eslint,semgrep,gitleaks'
#       visual_enabled: true
#       visual_threshold: 0.1
#       llm_enabled: true
#       stacks: 'auto'

name: 'Hawky Code Quality Gates'
description: 'AI-powered code quality gates for multi-agent teams'
author: 'The Crux Squad'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  mode:
    description: 'Operating mode: "check" (default) runs gates on PR, "baseline" generates baseline.json'
    required: false
    default: 'check'

  fail_fast:
    description: 'Stop running gates after first blocking gate failure'
    required: false
    default: 'true'

  gates:
    description: 'Comma-separated list of gates to run (typescript,eslint,semgrep,gitleaks,npm-audit,design-system,visual,llm-review)'
    required: false
    default: 'typescript,eslint,semgrep,gitleaks'

  config_path:
    description: 'Path to Hawky configuration file'
    required: false
    default: '.hawky.yml'

  github_token:
    description: 'GitHub token for PR comments (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}

  commit_baseline:
    description: 'Commit and push baseline files after generation (only for baseline mode)'
    required: false
    default: 'false'

  # Visual Regression Testing (E008)
  visual_enabled:
    description: 'Enable visual regression testing'
    required: false
    default: 'false'

  visual_threshold:
    description: 'Threshold for visual differences (0.0-1.0, where 1.0 = 100% different)'
    required: false
    default: '0.1'

  visual_routes:
    description: 'Comma-separated list of routes to test visually'
    required: false
    default: ''

  # Stack Modules (E011)
  stacks:
    description: 'Comma-separated list of stacks to validate (typescript,go,rust,python,terraform,docker,kubernetes) or "auto" for auto-detection'
    required: false
    default: 'auto'

  # LLM Review (E009)
  llm_enabled:
    description: 'Enable LLM-powered code review'
    required: false
    default: 'false'

  llm_api_key:
    description: 'API key for LLM service (Azure AI Foundry or compatible)'
    required: false
    default: ''

  llm_endpoint:
    description: 'LLM endpoint URL (Azure AI Foundry deployment URL)'
    required: false
    default: ''

  # Backend Convention Checks
  backend_checks_enabled:
    description: 'Enable backend convention checks (NestJS repository pattern, DTO validation, N+1 queries, unbounded queries)'
    required: false
    default: 'false'

  # Sprint Integration (E006)
  sprint_enabled:
    description: 'Enable sprint tracking integration'
    required: false
    default: 'false'

  sprint_file:
    description: 'Path to sprint file for integration'
    required: false
    default: '.claude/work/SPRINT.md'

  # Cross-Agent Coordination (E005)
  coordination_enabled:
    description: 'Enable cross-agent coordination checks'
    required: false
    default: 'true'

  stale_branch_threshold:
    description: 'Days before marking a branch as stale for coordination checks'
    required: false
    default: '10'

outputs:
  status:
    description: 'Overall status (pass/fail)'

  gates_passed:
    description: 'Number of gates that passed'

  gates_failed:
    description: 'Number of gates that failed'

  report_url:
    description: 'URL to the full report (step summary)'

  baseline_violations:
    description: 'Total violations in generated baseline (baseline mode only)'

  baseline_path:
    description: 'Path to generated baseline.json (baseline mode only)'

  llm_review_summary:
    description: 'Summary of LLM code review findings (if llm_enabled=true)'

  visual_diff_count:
    description: 'Number of visual differences detected (if visual_enabled=true)'

  stacks_detected:
    description: 'Comma-separated list of detected technology stacks'

  coordination_issues:
    description: 'Number of cross-agent coordination issues found'

runs:
  using: 'node20'
  main: 'dist/index.js'
